l_english:

 ### Numenor Submod Tradition ###
 tradition_adunaim_pride_name: "Bârîm-an-Anadûnê"
 tradition_adunaim_pride_desc: "Few among the inhabitants of the world can be said to carry themselves as the [Glossary('Bârîm-an-Anadûnê','barim_an_anadune_gloss')] do. Their pride in their land and people is unparalleled, with long centuries of prosperity and isolation fostering a profound reverence for the legacy of [anadune|E], of their forefathers. They are however mindful of the ruin once brought by pride upon their people, and so carefully preserve both the good and evil of their history, in hopes to never see the ruin of Westernesse repeated."
