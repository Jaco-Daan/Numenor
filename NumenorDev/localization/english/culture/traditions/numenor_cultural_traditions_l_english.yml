l_english:
 ### Númenor submod tradition ###
 tradition_adunaim_pride_name: "Bârîm-an-Anadûnê"
 tradition_adunaim_pride_desc: "Of all the peoples of the world, few carry themselves with such pride as the [Glossary('Bârîm-an-Anadûnê','barim_an_anadune_gloss')], for they dwell within the greatest realm of Men — [numenor|E]. Generations of prosperity and seclusion have instilled in them a deep reverence for their heritage and traditions. Their long isolation from other lands has made them cautious of outsiders, holding most dearly to kinship with those who share in the legacy of [anadune|E]."