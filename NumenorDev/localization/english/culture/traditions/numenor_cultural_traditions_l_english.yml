l_english:
 ### Númenor submod tradition ###
 tradition_adunaim_pride_name: "Bârîm-an-Anadûnê"
 tradition_adunaim_pride_desc: "Of all the peoples of the world, few carry themselves with the solemn dignity of the [Glossary('Bârîm-an-Anadûnê','barim_an_anadune_gloss')], for they dwell within the greatest realm ever raised by Men — [numenor|E]. Long centuries of prosperity, learning, and isolation have fostered in them a profound reverence for the legacy of [anadune|E] and the traditions handed down from their forefathers. Mindful of the pride that once brought ruin upon Westernesse, they guard their customs carefully and place great value upon kinship, memory, and the preservation of their ancient heritage." #AI PLACEHOLDER