l_english:

 adunaic:0 "Adûnâim"
 adunaic_collective_noun:0 "Adûnâim"
 adunaic_prefix:0 "Adûnâi"
 adunaic_desc:0 "#size:15    The Adûnâim, are those that inhabit the isle of Elenna, they are a hardy folk, with them being descendants of those that did not get caught up in the petty struggles of the King's Men and the Faithful, they are hardy survivors, having rebuilt Anadûnê following the Akallabêth, culturally they are similar to the Númenoreans of old, being both noble and honourable, yet ambitious. \n\nLike their forefathers of old, the Adûnâim are proud mariners, with the Belegaer being the second home of many, however, unlike their forefathers, the elven tongues have been mostly forgotten due to the neglect of the King's Men of the Second Age and the exodus of the Faithful, however, the wisest of the Adûnâim still take their names with the Elven tongues.#"

 heritage_adunaic_name:0 "Adûnaic"
 heritage_adunaic_collective_noun:0 "Adûnai"