l_english:
 
 ### Númenor ###
 
 palantir_romenna_name: "Palantír of Rómenna"
 palantir_romenna_description: "One of the Seeing Stones. Originally created by Fëanor of the Noldor, they were gifted to Númenor by the [eldar|E] out of the [westaman|E]. This particular stone, made of deep black crystal, was left in Rómenna by Elendil as he believed he could regain contact with Númenor once he reached Middle-Earth. Most of the stones were linked with each other and could be used to communicate over vast distances. They could also be used to witness events happening far away. They therefore provided great advantages to their owners... albeit at great risk, if one was held by powerful enemy."
 nibaran_name: "Niben Aranrúth"
 nibaran_description: "[Glossary('Niben Aranrúth','niben_aranruth_gloss')] is a blade forged in the image of Aranrúth, the ancient blade of the Kings of Númenor and the Kings of Doriaht before them, lost by Ar-Pharazôn in Valinor. Niben Aranrúth was made by [GetScriptedCharacterByHistoryID('lineofelros89').GetTitledFirstName] by melting down the four daggers of Elu Thingol - gifts given to him by the Dwarves of Nogrod - at the great forge of Ondostó. The sword has been passed down from King to Heir, and is accounted part of the Regalia of the Kings, alongside Dramborleg the axe. Though it is of masterful make, it is a mere echo of the sword before it - the world shall never see Aranrúth's like again."
 