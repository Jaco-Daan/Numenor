l_english:
 
 ### Númenor ###
 
 palantir_romenna_name:0 "Palantír of Rómenna"
 palantir_romenna_description:0 "One of the Seeing Stones. Originally created by Fëanor of the Noldor, they were gifted to Númenor by the elves, this particular stone was left in Rómenna by Elendil as he believed he could regain contact with Númenor once he reached Middle-Earth. Most of the stones were linked with each other and could be used to communicate over vast distances. They could also be used to witness events happening far away. They therefore provided great advantages to their owners... albeit at great risk, if one was held by powerful enemy."
 nibaran_name:0 "Niben Aranrúth"
 nibaran_description:0 "Niben Aranrúth (S. "Little Aranrúth") is a blade forged in image of Aranrúth, the ancient blade of the Kings of Númenor, which was lost by Ar-Pharazôn in Valinor. Niben Aranrúth was made by Ar-Hallatan by melting down the four daggers of Elu Thingol, which were gifts given to him by the Dwarves of Nogrod, at the great forge of Ondostó. Niben Aranrúth has been passed down from Ar-Hallatan to Ar-Balkazîr, the sword, alongside Dramborleg, is part of the Regalia of the Kings of Númenor."
 