l_english:
 
 ### Númenor ###
 
 palantir_romenna_name: "Palantír of Rómenna"
 palantir_romenna_description: "The [palantir|E], originally created by [GetScriptedCharacterByHistoryID('lineoffinwe3').GetFirstName] of the [noldorelves|E], were gifted to Númenor by the [eldar|E] out of the [westaman|E]. This particular stone, made of deep black crystal, was left in [GetTitleByKey('c_romenna').GetNameNoTier] by [elendil|E] as he believed he could regain contact with [numenor|E] once he reached [middleearth|E]. Most of the stones were linked with each other and could be used to communicate over vast distances. They could also be used to witness events happening far away. They therefore provided great advantages to their owners... albeit at great risk, if one was held by powerful enemy."
 nibaran_name: "Niben Aranrúth"
 nibaran_description: "[Glossary('Niben Aranrúth','niben_aranruth_gloss')] is a blade forged in the image of Aranrúth, the ancient blade of the Kings of [numenor|E] and the Kings of [GetTitleByKey('k_doriath').GetNameNoTier] before them, lost by [GetScriptedCharacterByHistoryID('lineofelros28').GetTitledFirstName] in [valinor|E]. Niben Aranrúth was made by [GetScriptedCharacterByHistoryID('lineofelros89').GetTitledFirstName] by melting down the four daggers of [elu_thingol|E] - gifts given to him by the [firebeards|E] of [nogrod|E] - at the great forge of [GetTitleByKey('c_ondosto').GetNameNoTier]. The sword has been passed down from king to heir, and is accounted part of the Regalia of the Kings, alongside Dramborleg, the axe of [GetScriptedCharacterByHistoryID('lineofhador10').GetFirstName]. Though it is of masterful make, it is a mere echo of the sword before it - the world shall never see Aranrúth's like again."
 scroll_of_kings_name: "Scroll of Kings"
 scroll_of_kings_description: "The Scroll of Kings was a list of all the Rulers of [numenor|E]. These names were written in [quenya|E], the tongue of the High Elves of the [west|E]. Even after the Kings of Númenor began to hate the [elves|E], they still used Quenya when they wrote their names into the Scroll, because they feared to break this tradition. For example, [GetScriptedCharacterByHistoryID('lineofelros21').GetTitledFirstName], the first King to take an [adunaic|E] royal name, had the Quenya translation Tar-Herunúmen written into the Scroll.
 