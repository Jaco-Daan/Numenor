 # Númenor Submod
 bm_3000_numenor:0 "An Island Reborn"
 bm_3000_numenor_desc:0 "Following the doomed invasion of Ar-Pharazôn the island of Númenor was nearly destroyed, its beautiful cities nearly consumed by waves and tempests and its people humbled by Eru in the cruel Akallabêth.\n\n Following the Akallabêth, Númenor was no better than their barbarian cousins in Middle Earth until Hallatan managed to reunite the island. Over the following years the few remaining scions of Melkorism were expunged and Númenor found peace, both the King's Men and the Faithful abandoned their petty struggle and over the years began uniting into one, until the reign of Vëantur the Compromiser, in which both ideologies officially united into the Adûnabên, the servants of the west. \n\nIt is now the year 3000 of the Third Era and Númenor's new goal is simple, to bring their colonies back into the fold. Will they achieve this and revive the old Empire or will Númenor fall victim to the cycle of Tyranny once more?"
 
 bookmark_numenor_balkazir:0 "Ar-Balkazîr"
 bookmark_numenor_balkazir_desc:0 "Ar-Balkazîr, High King of Númenor. He is a descendant of Elros through Gimilzagar, second son of Tar-Calmacil, and his line has ruled Númenor fairly and justly since the death of the tyrant, Ar-Pharazôn, while Númenor is not as strong as it once was he has long aspired to renew the ties between his island Kingdom and Middle Earth, and now, with the help of Ciryandur of Nísimaldar, he sets out to achieve it and restore the former Empire, either through diplomacy or force.\n\nWill you allow for Ar-Balkazir's dream to come true? or will you let the Council of the Sceptre prevent him from restoring the Empire and let the doom of men befall him without achieving it?"
 
 bookmark_numenor_ciryandur:0 "Lord Ciryandur"
 bookmark_numenor_ciryandur_desc:0 "Ciryandur, son of Haldrahir, a descendant of a branch of the House of Dol Amroth which refused integration with the Elves of Edhellond and desired to keep their Númenorean heritage more pure which came to be known as the Falmaradal, while they had the reputation as the best and fiercest warriors in all of Gondor they were scorned and seen as a pariah, a reminder to the times in which Gondor cared about purity.\n\nWhile Haldrahir was sailing to hunt down Umbarean pirates a great storm blew him off course and he landed in a strange land, Númenor, which was believed to be under the seas by everyone, but it was not. he was met by Ar-Dôlguzagar, and when he proved his descendance from Vëandur he received Nísimaldar and the King's daughter, in exchange, loyalty and all the information he knew of Middle Earth."
 
 bookmark_numenor_eldarion:0 "Lord Eldarion"
 bookmark_numenor_eldarion_desc:0 "Eldarion is the Lord of Andúnië, one of the most wealthy regions of Númenor, populated mostly by scholars and zealous individuals who admire the history of the region that never surrendered to the King's Men.\n\n\ Lord Eldarion may be a powerful member of the Council of the Sceptre but he is not without rivals, Lord Ciryandur of Nísimaldar is his friend and enemy, on paper both houses should be allies, yet they are not, for they both claim to be the Lords of Western Númenor, yet the pressure from Armenelos will ensure they will not fight each other in Númenor, but now that Middle Earth has been discovered once more, both houses will use this oportunity to expand their domain."
 
 bookmark_numenor_zorzagar:0 "Lord Zôrzagar"
 bookmark_numenor_zorzagar_desc:0 "Zôrzagar is the Lord of Hyarnórë, protector of the southern seas of Númenor and Lord of Opele Ancalimonva. The Line of Vardur descends from the second son of Tar-Atanamir, Vardur, who was made Sea-Lord of Umbar until his death during a Haradrim raid, the rest of the family returned to Númenor.\n\nThe Vardurionath, descendants of Vardur's daughter, became King's Men in order to further their political standing in Númenor. During the Akallabêth the Vardurionath remained neutral but once Ar-Cemendur won they did not convert into the Númenorean faith and therefore did not have the right to own lands. Following centuries of living their old manor around Orrostar until Imrazôr was born, who converted into the Númenorean faith and took the name Vardur, and was given the lands of Hyarnórë and made the Lord of the Southern Fleet.\n\nIt is now the year 3000 of the Third Age, and Númenor is looking back to expand into Middle Earth, will Zôrzagar take advantage of this to reclaim Umbar?"
 
 bookmark_numenor_niluben:0 "Lord Nilûbên"
 bookmark_numenor_niluben_desc:0 "Nilûbên is the Lord of Ciryanórë, a fertile region of Númenor located in Orrostar.\n\nNilûbên is a member of the House of Ciryandur, an ancient house which traces its descent to Elros himself, through a female line. The most known member of the House of Ciryandur was Heruhyarmen, who revolted against the growing influence of the King's Men in Númenor but failed and was executed, with his sons being spared but brought back to Númenor as hostages. Hyarmelion (Q. Scion of the South) managed to evade the King and marry in secret a servant girl from Orrostar and his descendants joined the Faithful faction.\n\nAfter the Akallabêth the Ciryandurion fought with Ar-Cemendur to reunify Númenor and were rewarded with holdings in Orrostar, which over time developed into the Duchy of Ciryanórë. It is now the year 3000 of the Third Age and Lord Nilûbên has been given the rights by Ar-Balkazîr to retake their old holdings in Pharazâin and make them a colony of Númenor once more."
 
 bookmark_numenor_gimilzagar:0 "Lord Gimilzagar"
 bookmark_numenor_gimilzagar_desc:0 "Gimilzagar is the Lord of the Nunduinë, a fair region of Númenor, filled with farmlands and fragrant trees.\n\nGimilzagar is a descendant of Khôrahil the Blind Sorcerer, who usurped the throne of the Colony of An-Balkûmagân by murdering his father and revolted agains the Line of Elros, while the Ciryamirionath were shunned by all Númenorean houses for centuries after that, they slowly began to recover their reputation, first by helping Ar-Cemendur in his fight to unify Númenor and then by showing their loyalty to Prince Ancalimon during the Second Númenorean Civil War, yet Ar-Dôlguzagar still decided to give away a portion of our land to Nísimaldar despite our loyalty.\n\nIt is now the year 3000 of the Third Age and Ar-Balkazîr has offered aid in recovering the ancient colony of An-Balkûmagân for Númenor. Shall the house of Ciryamir remain loyal to the Line of Elros or shall we follow the footsteps of Khôrahil?"