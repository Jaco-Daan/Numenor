 # Númenor Submod
 bm_3000_numenor: "An Island Reborn"
 bm_3000_numenor_desc: "Following the doomed invasion of Ar-Pharazôn, the island of Númenor was nearly destroyed - its beautiful cities consumed by waves and tempests and its people humbled by Eru in the cruel Akallabêth.\n\nAfter the Downfall, Númenor was little better than their barbarian cousins in Middle Earth, until Hallatan 'The Vanquisher', a scion of the line of Elros, managed to reunite the island. In the years after Hallatan's ascension, the few remaining holdouts of Melkorism were expunged and Númenor found a semblance of peace. Both the King's Men and the Faithful abandoned their struggle and over the years began uniting into one, until the reign of Vëantur 'the Compromiser', in which both ideologies officially united into the Adûnabên, the Servants of the West. \n\nIt is now the year 3000 of the Third Era and Númenor's new goal is simple, to bring their colonies back into the fold. Will they achieve this and revive the old Empire or will Númenor fall victim to the cycle of tyranny once more?"
 
 bookmark_numenor_balkazir: "Ar-Balkazîr"
 bookmark_numenor_balkazir_desc: "Ar-Balkazîr is the High King of Númenor. He is a descendant of Elros through Gimilzagar, second son of Tar-Calmacil, and his line has ruled Númenor fairly and justly since the death of the tyrant, Ar-Pharazôn. While Númenor is not as strong as it once was, long has he aspired to renew the ties between The Isle and Middle Earth, bringing peace and security to the surely scattered and diminished colonies. With the help of Ciryandur of Nísimaldar, he has set out to achieve his greatest hopes and restore the former empire, through word or sword.\n\nWill Ar-Balkazir's dream come true? Or will the Council of the Sceptre prevent him from restoring the empire and let the Doom of Men befall him without achieving it?"
 
 bookmark_numenor_ciryandur: "Lord Ciryandur"
 bookmark_numenor_ciryandur_desc: "Ciryandur is son of Haldrahir and lord of Nísimaldar. A descendant of a branch of the House of Dol Amroth, Haldrahir his sire refused integration with the Elves of Edhellond and desired to keep their Númenorean heritage more pure. Him and his faction came to be known as the Falmaradal, and while they had the reputation as the best and fiercest warriors in all of Gondor, they were scorned and seen as pariahs, a reminder to the times in which Gondor cared about purity.\n\nWhen Haldrahir was sailing to hunt down Umbarean pirates (in a racism-driven rage) a great storm blew him far off course. He landed in a strange and fair land, and recognized it as Númenor, believed to have sunken under the waves. There he was met by Ar-Dôlguzagar, and when he proved his descendance from Vëandur, he received Nísimaldar and the King's daughter. In exchange, Haldrahir pledged loyalty and all the information he knew of Middle Earth. Now, with Ciryandur Haldrahir's son as lord of Nísimaldar, he begins plans on a venture to Belfalas, the home of the Princes of Dol Amroth..."
 
 bookmark_numenor_eldarion: "Lord Eldarion"
 bookmark_numenor_eldarion_desc: "Eldarion is the Lord of Andúnië, one of the most wealthy regions of Númenor, populated mostly by scholars and zealous individuals who admire the history of the region that never surrendered to the King's Men.\n\n Lord Eldarion may be a powerful member of the Council of the Sceptre but he is not without rivals, Lord Ciryandur of Nísimaldar is his friend and enemy, on paper both houses should be allies, yet they are not, for they both claim to be the Lords of Western Númenor, yet the pressure from Armenelos will ensure they will not fight each other in Númenor, but now that Middle Earth has been discovered once more, both houses will use this oportunity to expand their domain."
 
 bookmark_numenor_zorzagar: "Lord Zôrzagar"
 bookmark_numenor_zorzagar_desc: "Zôrzagar is the Lord of Hyarnórë, protector of the southern seas of Númenor and Lord of Londë Ancalimonva. The Line of Vardur descends from the second son of Tar-Atanamir, Vardur, who was made Sea-Lord of Umbar until his death during a Haradrim raid, the rest of the family returned to Númenor.\n\nThe Vardurionath, descendants of Vardur's daughter, became King's Men in order to further their political standing in Númenor. During the Akallabêth the Vardurionath remained neutral but once Ar-Cemendur won they did not convert into the Númenorean faith and therefore did not have the right to own lands. Following centuries of living their old manor around Orrostar until Imrazôr was born, who converted into the Númenorean faith and took the name Vardur, and was given the lands of Hyarnórë and made the Lord of the Southern Fleet.\n\nIt is now the year 3000 of the Third Age, and Númenor is looking back to expand into Middle Earth, will Zôrzagar take advantage of this to reclaim Umbar?"
 
 bookmark_numenor_niluben: "Lord Nilûbên"
 bookmark_numenor_niluben_desc: "Nilûbên is the Lord of Ciryanórë, a fertile region of Númenor located in Orrostar.\n\nNilûbên is a member of the House of Ciryandur, an ancient house which traces its descent to Elros himself, through a female line. The most known member of the House of Ciryandur was Heruhyarmen, who revolted against the growing influence of the King's Men in Númenor but failed and was executed, with his sons being spared but brought back to Númenor as hostages. Hyarmelion (Q. Scion of the South) managed to evade the King and marry in secret a servant girl from Orrostar and his descendants joined the Faithful faction.\n\nAfter the Akallabêth the Ciryandurion fought with Ar-Cemendur to reunify Númenor and were rewarded with holdings in Orrostar, which over time developed into the Duchy of Ciryanórë. It is now the year 3000 of the Third Age and Lord Nilûbên has been given the rights by Ar-Balkazîr to retake their old holdings in Pharazâin and make them a colony of Númenor once more."
 
 bookmark_numenor_gimilzagar: "Lord Gimilzagar"
 bookmark_numenor_gimilzagar_desc: "Gimilzagar is the Lord of the Nunduinë, a fair region of Númenor, filled with farmlands and fragrant trees.\n\nGimilzagar is a descendant of Khôrahil the Blind Sorcerer, who usurped the throne of the Colony of An-Balkûmagân by murdering his father and revolted agains the Line of Elros, while the Ciryamirionath were shunned by all Númenorean houses for centuries after that, they slowly began to recover their reputation, first by helping Ar-Cemendur in his fight to unify Númenor and then by showing their loyalty to Prince Ancalimon during the Second Númenorean Civil War, yet Ar-Dôlguzagar still decided to give away a portion of our land to Nísimaldar despite our loyalty.\n\nIt is now the year 3000 of the Third Age and Ar-Balkazîr has offered aid in recovering the ancient colony of An-Balkûmagân for Númenor. Shall the house of Ciryamir remain loyal to the Line of Elros or shall we follow the footsteps of Khôrahil?"