 # Númenor Submod
 bm_3000_numenor: "An Island Reborn"
 bm_3000_numenor_desc: "Following the doomed invasion of Ar-Pharazôn, the island of [numenor|E] was nearly destroyed - its beautiful cities consumed by waves and tempests and its people humbled by [eru|E] in the cruel [akallabeth|E].\n\nAfter the [downfall|E], Númenor was little better than their cousins in [middleearth|E], until Hallatan 'The Vanquisher', a scion of the line of [elrosshort|E], managed to reunite the island. In the years after Hallatan's ascension, the few remaining holdouts of Melkorism were expunged and Númenor found a semblance of peace. Both the [kingsmen|E] and the [faithful|E] abandoned their struggle and over the years began uniting into one, until the reign of Vëantur 'the Compromiser', in which both ideologies officially united into the Adûnabên, the Servants of the West. \n\nIt is now the year 3000 of the [thirdage|E] and Númenor's new goal is simple, to bring their colonies back into the fold. Will they achieve this and revive the old empire or will Númenor fall victim to the cycle of tyranny once more?"
 
 bookmark_numenor_balkazir: "Ar-Balkazîr"
 bookmark_numenor_balkazir_desc: "Ar-Balkazîr is the High King of [numenor|E]. He is a descendant of [elrosshort|E] through Gimilzagar,, second son of Tar-Calmacil, and his line has ruled [numenor|E] fairly and justly since the death of the tyrant, Ar-Pharazôn. While Númenor is not as strong as it once was, long has he aspired to renew the ties between The Isle and [middleearth|E], bringing peace and security to the surely scattered and diminished colonies. With the help of Ciryandur of Nísimaldar, he has set out to achieve his greatest hopes and restore the former empire, through word or sword.\n\nWill Ar-Balkazîr's dream come true? Or will the Council of the Sceptre prevent him from restoring the empire and let the Doom of Men befall him without achieving it?"
 
 bookmark_numenor_ciryandur: "Lord Ciryandur"
 bookmark_numenor_ciryandur_desc: "Ciryandur is son of Haldrahir and lord of Nísimaldar. A descendant of a branch of the House of Dol Amroth, Haldrahir his sire refused integration with the [elves|E] of Edhellond and desired to keep their [numenorean|E] heritage more pure. Him and his faction came to be known as the Falmaradal, and while they had the reputation as the best and fiercest warriors in all of [gondor|E], they were scorned and seen as pariahs, a reminder to the times in which Gondor cared about purity.\n\nWhen Haldrahir was sailing to hunt down [umbarean|E] pirates, a great storm blew him far off course. He landed in a strange and fair land, and recognized it as Númenor, believed to have sunken under the waves. There he was met by Ar-Dôlguzagar, and when he proved his descendance from Vëandur, he received Nísimaldar and the King's daughter. In exchange, Haldrahir pledged loyalty and all the information he knew of [middleearth|E]. Now, with Ciryandur, Haldrahir's son, as lord of Nísimaldar, he begins plans on a venture to Belfalas, the home of the Princes of Dol Amroth..."
 
 bookmark_numenor_eldarion: "Lord Eldarion"
 bookmark_numenor_eldarion_desc: "Eldarion is the Lord of Andúnië, one of the most wealthy regions of [numenor|E], populated mostly by scholars and zealous individuals who admire the history of the region that never surrendered to the [kingsmen|E].\n\n Lord Eldarion may be a powerful member of the Council of the Sceptre but he is not without rivals, Lord Ciryandur of Nísimaldar is his friend and enemy, on paper both houses should be allies, yet they are not, for they both claim to be the Lords of Western Númenor, yet the pressure from Armenelos will ensure they will not fight each other in Númenor, but now that [middleearth|E] has been discovered once more, both houses will use this oportunity to expand their domain."
 
 bookmark_numenor_zorzagar: "Lord Zôrzagar"
 bookmark_numenor_zorzagar_desc: "Zôrzagar is the Lord of Hyarnórë, protector of the southern seas of [numenor|E] and Lord of Londë Ancalimonva. The Line of Vardurionath descends from the second son of Tar-Atanamir, Vardur, who was made Sea-Lord of [umbar|E] until his death during a [haradrim|E] raid, the rest of the family returned to Númenor.\n\nThe Vardurionath, descendants of Vardur's daughter, became [kingsmen|E] in order to further their political standing in Númenor. During the [akallabeth|E] the Vardurionath remained neutral but once Ar-Cemendur won they did not convert into the Númenórean faith and therefore did not have the right to own lands. Following centuries of living their old manor around Orrostar until Imrazôr was born, who converted into the Númenórean faith and took the name Vardur, and was given the lands of Hyarnórë and made the Lord of the Southern Fleet.\n\nIt is now the year 3000 of the [thirdage|E], and Númenor is looking back to expand into [middleearth|E], will Zôrzagar take advantage of this to reclaim Umbar?"
 
 bookmark_numenor_niluben: "Lord Nilûbên"
 bookmark_numenor_niluben_desc: "Nilûbên is the Lord of Ciryanórë, a fertile region of [numenor|E] located in Orrostar.\n\nNilûbên is a member of the House of Ciryandurion, an ancient house which traces its descent to [elrosshort|E] himself, through a female line. The most known member of the House of Ciryandurion was Heruhyarmen, who revolted against the growing influence of the [kingsmen|E] in Númenor but failed and was executed, with his sons being spared but brought back to Númenor as hostages. [Glossary('Hyarmelion','hyarmelion_gloss')] managed to evade the King and marry in secret a servant girl from Orrostar and his descendants joined the [faithful|E] faction.\n\nAfter the [akallabeth] the Ciryandurion fought with Ar-Cemendur to reunify Númenor and were rewarded with holdings in Orrostar, which over time developed into the duchy of Ciryanórë. It is now the year 3000 of the [thirdage|E] and Lord Nilûbên has been given the rights by Ar-Balkazîr to retake their old holdings in Pharazâin and make them a colony of Númenor once more."
 
 bookmark_numenor_gimilzagar: "Lord Gimilzagar"
 bookmark_numenor_gimilzagar_desc: "Gimilzagar is the Lord of the Nunduinë, a fair region of [numenor|E], filled with farmlands and fragrant trees.\n\nGimilzagar is a descendant of Khôrahil 'the Blind Sorcerer', who usurped the throne of the colony of An-Balkûmagân by murdering his father and revolted agains the Line of [elrosshort|E], while the Ciryamirionath were shunned by all Númenórean houses for centuries after that, they slowly began to recover their reputation, first by helping Ar-Cemendur in his fight to unify Númenor and then by showing their loyalty to Prince Ancalimon during the Second Númenórean Civil War, yet Ar-Dôlguzagar still decided to give away a portion of our land to Nísimaldar despite our loyalty.\n\nIt is now the year 3000 of the [thirdage|E] and Ar-Balkazîr has offered aid in recovering the ancient colony of An-Balkûmagân for Númenor. Shall the house of Ciryamirionath remain loyal to the Line of Elros or shall we follow the footsteps of Khôrahil?"
