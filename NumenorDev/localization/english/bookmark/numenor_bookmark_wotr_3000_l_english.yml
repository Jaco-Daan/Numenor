 # Numenor Submod Bookmarks
 bm_3000_numenor: "An Island Reborn"
 bm_3000_numenor_desc: "Following the doomed invasion of Ar-Pharazôn, the island of Númenor was nearly destroyed - its beautiful cities consumed by waves and tempests and its people humbled by Êru in the cruel Akallabêth.\n\nAfter the Downfall, Númenor was little better than their cousins in Middle-Earth, until Hallatan 'The Vanquisher', a scion of the line of Elros, managed to reunite the island. In the years after Hallatan's ascension, the few remaining holdouts of Mulkêrhili were expunged and Númenor found a semblance of peace. Both the King's Men and the Faithful abandoned their struggle and over the years began uniting into one, until the reign of Vëantur 'the Compromiser', in which both ideologies officially united into the Adûnabên, the Servants of the West. \n\nIt is now the year 3000 of the Third Age and Númenor's new goal is simple, to bring their colonies back into the fold. Will they achieve this and revive the old empire or will Númenor fall victim to the cycle of tyranny once more?"
 
 bookmark_numenor_balkazir: "Ar-Balkazîr"
 bookmark_numenor_balkazir_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_numenor_balkazir_desc: "Ar-Balkazîr is the High King of [numenor|E]. He is a descendant of [elrosshort|E] through Gimilzagar, second son of Tar-Calmacil, and his line has ruled [numenor|E] fairly and justly since the death of the tyrant, Ar-Pharazôn. While Númenor is not as strong as it once was, long has he aspired to renew the ties between The Isle and [middleearth|E], bringing peace and security to the surely scattered and diminished colonies. With the help of Ciryandur of Nísimaldar, he has set out to achieve his greatest hopes and restore the former empire, through word or sword.\n\nWill Ar-Balkazîr's dream come true? Or will the Council of the Sceptre prevent him from restoring the empire and let the Doom of Men befall him without achieving it?"
 
 bookmark_numenor_ciryandur: "Lord Ciryandur"
 bookmark_numenor_ciryandur_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_numenor_ciryandur_desc: "Ciryandur is son of Gaerdon and lord of Nísimaldar. A descendant of a branch of the House of Dol Amroth, his sires had refused integration with the [elves|E] of Edhellond and desired to keep their [numenorean|E] heritage more pure. Their faction came to be known as the Falmaradal, and while they had the reputation as the best and fiercest warriors in all of [gondor|E], they were scorned and seen as pariahs, a reminder to the times in which Gondor cared about purity.\n\nWhen Gaerdon was sailing to hunt down umbarean pirates a great storm blew him far off course. He landed in a strange and fair land, and recognized it as Númenor, believed to have sunken under the waves. There he was met by Tar-Airendur, and when he proved his descendance from Vëandur, he received fair Nísimaldar and the hand of the King's daughter. In exchange, Gaerdon pledged loyalty and all the information he knew of [middleearth|E]. Now, with Ciryandur Gaerdon's son as lord of Nísimaldar, he begins plans on a venture to Belfalas, the home of the Princes of Dol Amroth...\n\nWill Ciryandur succeed in his journey to reclaim Belfalas for the [adunai|E] of the Isle, or will he fail, founder, and drown in the attempt?"
 
 bookmark_numenor_eldarion: "Lord Eldarion"
 bookmark_numenor_eldarion_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_numenor_eldarion_desc: "Eldarion is the Lord of Andúnië, one of the most wealthy regions of [numenor|E], populated mostly by scholars and zealous individuals who admire the history of the region that never surrendered to the [kingsmen|E].\n\n Lord Eldarion may be a powerful member of the Council of the Sceptre but he is not without rivals. Ciryandur of Nísimaldar, scion of Dol Amroth, is his friend and enemy - on paper both houses should be allies, but both claim to be the Lords of Western Númenor. For now, the pressure from Armenelos ensures they will not come to blows, but now that [middleearth|E] has been discovered once more, both houses will use this oportunity to expand their domain.\n\nCan Eldarion claim once more the lordship of Western Númenor, or will his house finally fail to the obstacles set before them?"
 
 bookmark_numenor_zorzagar: "Lord Zôrzagar"
 bookmark_numenor_zorzagar_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_numenor_zorzagar_desc: "Zôrzagar is the Lord of Hyarnórë, protector of the southern seas of [numenor|E] and Lord of Londë Ancalimonva. The Line of Vardur descends from the second son of Tar-Atanamir, Vardur, who was made Sea-Lord of [umbar|E]. When Vardur died during a [haradrim|E] raid, the rest of the family was quickly ferried back to Númenor.\n\nThe Vardurioni, descendants of Vardur's daughter, aligned themselves with the growing faction of the [kingsmen|E] in order to further their political standing in Númenor. During the [akallabeth|E] the Vardurioni remained neutral, but though Ar-Cemendur won, they did not renounce their allegiance to the Ârûwanâi, and therefore did not have the right to own lands. Following centuries of living in their old manor around Orrostar, a Vardurion named Imrazôr was born. He took the name Vardur, and took on the trappings and faith of Númenor - and as a gift for their now-unsundered line of kinsmen, the King granted him the fair lands of Hyarnórë. Alongside this, he was made the Lord of the Southern Fleet.\n\nIt is now the year 3000 of the [thirdage|E], and Númenor is looking back to expand into [middleearth|E]. Will Zôrzagar, scion of Vardur, take advantage of this to reclaim Umbar, or shall the greatest colony of the Adûnâi remain in foreign hands?"

 bookmark_numenor_niluben: "Lord Nîlubên"
 bookmark_numenor_niluben_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_numenor_niluben_desc: "Nîlubên is the Lord of Ciryanórë, a fertile region of [numenor|E] located in Orrostar.\n\nNilûbên is a member of the House of Ciryandur, an ancient house which traces its descent to [elrosshort|E] himself, albeit through a female line. The most famous (or infamous, depending on who is asked) member of the House of Ciryandur was Heruhyarmen, who revolted against the growing influence of the King's Men in Númenor. He failed and was executed, but his sons being spared but brought back to Númenor as hostages. One of his sons, [Glossary('Hyarmenion','hyarmenion_gloss')], managed to evade the King and marry in secret a servant girl from Orrostar, and his descendants joined the [faithful|E] faction for protection from the King's Men.\n\nAfter the [akallabeth], the Ciryandurion fought with Ar-Cemendur to reunify Númenor. They were rewarded with holdings in Orrostar, which over time developed into the Duchy of Ciryanórë. It is now the year 3000 of the [thirdage|E] and Lord Nîlubên has been given the rights by Ar-Balkazîr to retake their old holdings in Pharazâin and make them a colony of Númenor once more.\n\nShall Nîlubên remake Pharazâin, the golden? Or shall his will be denied by those who yet live upon these southern shores?"
 
 bookmark_numenor_gimilzagar: "Lord Gimilzagar"
 bookmark_numenor_gimilzagar_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_numenor_gimilzagar_desc: "Gimilzagar is the Lord of the Nunduinë, a fair region of [numenor|E], filled with farmlands and fragrant trees.\n\nGimilzagar is a descendant of Khôrahil the Blind Sorcerer, who usurped the throne of the Colony of An-Balkûmagân by murdering his father and revolted agains the Line of [elrosshort|E]. For many lives of Men, the descendants of Khôrahil's children were shunned by all Númenoreans. After the Akallabêth, however, they slowly began to recover their reputation, first by helping Ar-Cemendur in his fight to unify Númenor and then by showing their loyalty to Prince Ancalimon during the Second Númenorean Civil War. Even still, their hateful descent has not been redeemed in full, for Tar-Airendur still decided to give away their holdings in Nísimaldar despite their loyalty.\n\nIt is now the year 3000 of the [thirdage|E] and Ar-Balkazîr has offered aid in recovering the ancient colony of An-Balkûmagân for Númenor. Shall the house of Ciryamir remain loyal to the Line of Elros or shall they follow in the footsteps of Khôrahil?"