l_english: 
 ### Númenor Submod ###
 faith_adunaic: "Adûnabên"
 faith_adunaic_adj: "Adûnabên" # An-Adûnabên
 faith_adunaic_adherent: "Adûnabên"
 faith_adunaic_adherent_plural: "Adûnabênî"
 faith_adunaic_desc: "[Glossary('Adûnabên','adunaben_gloss')] is the faith of the $adunaic_collective_noun$, founded by Tar-Vëantur the Pragmatic. The $faith_adunaic_adherent_plural$ preserve many teachings of the [faithful|E], revering Êru and the Avalôi, though centuries of isolation and hardship have shaped their beliefs into a stern and deeply conservative tradition. They hold that the Adûnâi were entrusted with great wisdom and long life not for dominion, but for stewardship, and that the Downfall of Númenor stands as an eternal warning against pride, tyranny, and the hunger for mastery over others. Thus the Adûnâi see themselves not as rulers of lesser peoples, but as guardians of the memory of Westernesse.\n\nThough many ancient rites of the Eruainocimië have faded with time, the Meneltarma remains revered as the holy mountain, remembered by the wise as the fane of Êru [erutheone|E]. At its middle slopes, once every half-decade, memorials are held for the victims of the Downfall and those who perished beneath the shadow of Mulkhêr. There the elders of Númenor recount the follies of the past to the young, so that the arrogance which destroyed their forefathers shall not arise anew.\n\n$faith_adunaic$ is a pragmatic faith, concerned above all with the endurance and prosperity of the $adunaic_collective_noun$. In this regard it often resembles a cultural order as much as a religion. Yet beneath its stern traditions endure the remnants of ancient Númenor: reverence for the Avalôi, respect for lawful rule, and the enduring belief that wisdom without humility leads only to ruin." #AI PLACEHOLDER
 
 faith_dairaben: "Batân an-Phazân"
 faith_dairaben_adj: "Batân an-Phazân" # 'nBatâna 'nPhazân
 faith_dairaben_adherent: "Phazâmbên"
 faith_dairaben_adherent_plural: "Phazâmbênî"
 faith_dairaben_desc: "[Glossary('Batân an-Phazân','batan_an_phazan_gloss')] is a faith that emerged following the [akallabeth|E] from the shattered remnants of the Ârûwânai - only the moderate factions had survived the destruction caused by Êru. The majority of Ârûwânai refused to aid the few remaining Mulkhêrhilî and sided with Prince Dâirabên's decision to support the compromise of Ar-Zimraphel following the Council of Ondosto. His people aided her during the First Númenórean Civil War and with the reconstruction process that began afterwards.\n\nThe $faith_dairaben_adj$ teachings are mostly a continuation of the [kingsmen|E], though they adhere somewhat to the Valar and the majority of their teachings. $faith_dairaben_adherent_plural$ display the same Adûnâi arrogance that had plagued Anadûnê before the Akallabêth, putting an emphasis on the 'traditional values' of the Adûnâi. Indeed, this faction eventually went against the policies of pragmatism preached at the Council of Ondosto, and have continued the remembrance and veneration of the ancestors began by Tar-Atanamir."
 

