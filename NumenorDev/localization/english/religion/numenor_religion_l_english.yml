l_english: 
 ### Númenor Submod ###
 faith_adunaic: "Adûnabên"
 faith_adunaic_adj: "Anadûnabên" # An-Adûnabên
 faith_adunaic_adherent: "Adûnabên"
 faith_adunaic_adherent_plural: "Adûnabênî"
 faith_adunaic_desc: "[Glossary('Adûnabên','adunaben_gloss')] is the faith of the $adunaic_collective_noun$, founded by Ar-Vëantur the Pragmatic. The $faith_adunaic_adherent_plural$ follow the teachings of the [faithful|E] to a certain extent - they respect Êru and the Valar, yet their own arrogance has shaped their beliefs such that they believe they are superior to all other races - whether it be the [elves|E], [dwarves|E], or any of the myriad cultures of 'lesser [men]' - even their colonial kinsmen are inferior to them. They consider themselves as the mediators between the [valargods|E] and the Men of Middle Earth, a legacy of the influence of the [kingsmen|E].\n\nWhile the ancient traditions of the Eruainocimië have been forgotten to time, the Meneltarma is still seen as the holy mountain, and remembered by the wise as the fane of Êru [erutheone|E]. As such, a memorial to the victims of the Downfall and the servants of Mulkhêr is held at the middle of the mountain every half-decade, where the elders of Númenor tell the youth of the past so that they may not repeat it.\n\n$faith_adunaic$ is a pragmatic faith, and is centered on the prosperity of the $adunaic_collective_noun$ most of all. In that regard, it is more of a faction rather than a faith. At its core, however, the traditions of old Númenor and veneration of the Valar is still present, even if greatly corrupted or changed.\n\nAs of the year 3000 of the Third Age, the $faith_adunaic$ control all of Númenor, and their devoted are eager to spread the faith to Middle Earth."
 
 faith_dairaben: "Batân an-Phazân"
 faith_dairaben_adj: "Batân an-Phazân" # 'nBatâna 'nPhazân
 faith_dairaben_adherent: "Phazâmbên"
 faith_dairaben_adherent_plural: "Phazâmbênî"
 faith_dairaben_desc: "[Glossary('Batân an-Phazân','batan_an_phazan_gloss')] is a faith that emerged following the [akallabeth|E] from the shattered remnants of the Ârûwânai - only the moderate factions had survived the destruction caused by Êru. The majority of Ârûwânai refused to aid the few remaining Mulkhêrhilî and sided with Prince Dâirabên's decision to support the compromise of Ar-Zimraphel following the Council of Ondostó. His people aided her during the First Númenórean Civil War and with the reconstruction process that began afterwards.\n\nThe $faith_dairaben_adj$ teachings are mostly a continuation of the [kingsmen|E], though they adhere somewhat to the Valar and the majority of their teachings. $faith_dairaben_adherent_plural$ display the same Adûnâi arrogance that had plagued Anadûnê before the Akallabêth, putting an emphasis on the 'traditional values' of the Adûnâi. Indeed, this faction eventually went against the policies of pragmatism preached at the Council of Ondostó, and have continued the rememberance and veneration of the ancestors began by Tar-Atanamir."
 

