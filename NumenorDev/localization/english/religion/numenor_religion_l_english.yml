 ### Númenor Submod ###
faith_adunaic:0 "Adûnabên"
faith_adunaic_adj:0 "Adûnabên"
faith_adunaic_adherent:0 "Adûnabên"
faith_adunaic_adherent_plural:0 "Adûnabên"
faith_adunaic_desc:0 "Adûnabên, or Wisdom of the West, is the faith of the Adûnâim, having been founded by the pragmatic Ar-Vëantur the Pragmatic. The Adûnabên follows the teachings of the faithful, they respect Eru and the Valar, yet their own arrogance has shaped their beliefs so that they are superior to all other races, they see themselves as the middle men between the Vala and the Men of Middle Earth, a legacy of the King's Men influence in Númenor. While the ancient traditions of the Eruainocimië have been forgotten to time, the Meneltarma is still seen as the holy mountain and a memorial to the victims of the Downfall and the Melkorites is held there every half a decade, where the elders of Númenor tell the youth of the past, so they do not repeat it.\n\nAdûnabên is a pragmatic faith, and is centered on the prosperity of the Adûnâim most of all, which is why many call it a faction, rather than a faith, but in its core, the traditions and worship of the Vala is still there, even if corrupted or changed. As of the year 3000 of the Third Age, the Adûnabên control all of Númenor, and their devoted are ready to spread the faith to Middle Earth."
 
faith_dairaben:0 "Batân an-Phazân"
faith_dairaben_adj:0 "Batân an-Phazân"
faith_dairaben_adherent:0 "Phazânî"
faith_dairaben_adherent_plural:0 "Phazânî"
faith_dairaben_desc:0 "Batân an-Phazân, or The Path of the Prince, is a faith that emerged following the Akallabêth from the shattered remnants of the Ârûwânai, which only the most moderate factions surviving the destruction caused by Êru. The majority of Ârûwânai refused to aid the few remaining Mulkhêrhilî and sided with Prince Dâirabên's decision to support the compromise offered by Ar-Zimraphel following the Council of Ondostó and aided her during the First Númenórean Civil War and the reconstruction process that began afterwards.\n\nThe Phazânî teachings, while on their core adhere to the Valar and the majority of their teachings, still show a considerable amount of Ârûwânai influence, displaying the same Adûnaic arrogance that had plagued Anadûnê before the Akallabêth, putting an emphasis on traditional values and eventually going against the policies of pragmatism preached at the Council of Ondostó, and continuing the culture of rememberance for the dead began by Tar-Atanamir."
 

