l_english:
  #### NÚMENOR SUBMOD ####
  building_type_wonder_armenelos_01:0 "Armenelos: City of Kings"
  building_type_wonder_armenelos_01_desc:0 "Armenelos, also known as Arminalêth, is the Capital of Númenor, fairest city in the West, rivalling even Tirion. Armenelos' fortunes declined during the reign of Ar-Pharazôn who turned the city into a foggy nightmare of evil, Nimloth the Fair itself was burnt by the tyrant and the innocent people were sacrificed at the Altar of Melkor, the last straw was the Akallabêth, which left the city in ruins for centuries, during which the capital of Númenor was Ondostó."
  building_wonder_armenelos_01:0 "Armenelos the Ruin"
  building_wonder_armenelos_01_desc:0 "Armenelos is at the lowest it has been, the entire city is crumbling and is a ghost town, nobody dares to enter Armenelos. We must rebuild this fair city in order to fortify our control of Númenor and to move the capital back there, although it will take a lot of manpower and gold."
  building_wonder_armenelos_02:0 "Armenelos: Capital of Númenor"
  building_wonder_armenelos_02_desc:0 "Although we have long rebuilt Armenelos to mostly what it was before its corruption by the Melkorists, the city is still not Armenelos the Golden of the past, we must still rebuild the areas damaged by the Second Civil War, however, we are lacking in recources, expanding back into our former Empire will give us the gold and resources we need to make Armenelos the fairest city on Arda once more."
  building_wonder_armenelos_03:0 "Armenelos the Golden"
  building_wonder_armenelos_03_desc:0 "Armenelos has been rebuilt to its former splendour, traders from all of Númenor and Middle Earth stay at the markests, which are filled with a diverse range of aromas and goods, spices from the Harnen, jewels from Thâni-Hazâd, fish from Nindamos, the list goes ever on, no longer shall we need to look at our mighty city with sorrow, we can now stand proud and look at Armenelos the Golden reborn."
  building_wonder_armenelos_04:0 "Nimloth the Fair"
  building_wonder_armenelos_04_desc:0 "Although the tyrannical Melkorists cut down and burnt Nimloth the Fair during the reign of Ar-Pharazôn we have learnt that Isildur of Andúnië saved a sapling which was planted in Gondor, although their tree has also been dead for years, we have found a new sapling in the slopes of Mindolluin, which has been brought back to Armenelos and planted in the King's Court. Now that Nimloth is reborn, the line of Kings shall last until the end of the world."
 
  building_type_wonder_romenna_01:0 "Rómenna: Haven of the East"
  building_type_wonder_romenna_01_desc:0 "Rómenna was the greatest port in Númenor, being home to its greatest shipyards and the most skilled and brightest shipwrights in all of Middle Earth. During the reign of Ar-Gimilzôr the faithful were forced to move there which increased its population and overcrowded it, the city saw much exodus into Middle Earth during those times by the faithful. After Akallabêth, in which the city was left a ruin by the waves of Númenor and was left populated only by a handful of fishermen."
  building_wonder_romenna_01:0 "Rómenna the Faithful"
  building_wonder_romenna_01_desc:0 "Rómenna was left ruined by the Akallabêth, its great harbour was completely broken, the Aldarion Walls were crushed by the mighty waves and the city itself nearly sank into the ocean, following the Akallabêth, Rómenna was populated only by a handful of fishermen. Although the reconstruction of Rómenna did not start until the reign of Aldarion II, who took great pride in the city his namesake loved, the reconstruction was slow and the lack of trade made it a low priority for future Kings"
  building_wonder_romenna_02:0 "Rómenna: Greatest Haven of the East"
  building_wonder_romenna_02_desc:0 "During the reign of Ar-Inziladûn, Rómenna regained importance as Númenor began to look once more to restore its old colonial Empire, the city regained life and its former splendour began to return, during the reconstruction a Palantír was found in the ancient halls of Amandil, leader of the faithful, which was transported to Armenelos. By the reign of Ar-Balkazîr, Rómenna has been restored much of its old splendour, but it still is not what it once was."
  building_wonder_romenna_03:0 "Rómenna: The Gateway to Middle Earth"
  building_wonder_romenna_03_desc:0 "Rómenna has been restored its old glory and splendour, ships from all of Middle Earth now dock here, the great walls of Aldarion have been made anew and its shipbuilding industry has been restored, taking advantage of trade from Vinyalondë, Pelargir and Korlea. Rómenna is now one of the most important cities in Arda, being rivalled only by Pelargir and Dol Amroth."
 
  building_type_wonder_sorontil_01:0 "Tower of Tar-Meneldur"
  building_type_wonder_sorontil_01_desc:0 "Sorontil is the second highest mountain range in Númenor, behind only the Meneltarma. During the reign of Tar-Meneldur a tower was built here as the sky was clearer so he could study the stars. Some of the Great Eagles also called Sorontil their home, but left during the reign of Tar-Ancalimon I."
  building_wonder_sorontil_01:0 "The Tower in Ruins"
  building_wonder_sorontil_01_desc:0 "Ever since the Akallabêth, in which the Tower of Meneldur was broken by the tremors, it has remained a ruin, rarely visited by anyone except pilgrims and scholars, but with enough resources and manpower we can rebuild this great tower once more."
  building_wonder_sorontil_02:0 "The Tower of Tar-Meneldur"
  building_wonder_sorontil_02_desc:0 "The Tower of Tar-Meneldur has been restored to its former glory, using stones brought from Ondostó. Our scholars now have a new place to study the stars."
 
  building_type_wonder_calmindon_01:0 "Calmindon"
  building_type_wonder_calmindon_01_desc:0 "Calmindon was a tower raised in Tol Uinen by Aldarion so it could shine a light across the Bay of Rómenna, while it collapsed during the Akallabêth it was rebuilt during the reign of Tar-Aldarion II."
  building_wonder_calmindon_01:0 "Calmindon"
  building_wonder_calmindon_01_desc:0 "Calmindon was a tower raised in Tol Uinen by Aldarion when he was the prince. Calmindon was built for the Guild of Venturers so it could shine a light across the Bay of Rómenna, while it collapsed during the Akallabêth it was Restored by Tar-Aldarion II due to the admiration he held for his namesake. Calmindon still serves as one of the biggest lighthouses in Arda, being used to ensure fishermen and merchants do not stray off their path and find safe haven in Rómenna."
 
  building_type_wonder_oromet_01:0 "Tower of Oromet"
  building_type_wonder_oromet_01_desc:0 "The Tower of Oromet was built in the Hill of Oromet, in Andustar, by Tar-Minastir in order to watch the lands of Valinor, during the reign of Tar-Calmacil the tower was turned into a watchtower to ensure that no Elves could come into Númenor. During the Akallabêth the tower was destroyed."
  building_wonder_oromet_01:0 "Ruined Tower of Oromet"
  building_wonder_oromet_01_desc:0 "The Tower of Oromet was destroyed during the Akallabêth by the tremors and waves that hit Númenor, it still lays in ruins to this day."
  building_wonder_oromet_02:0 "The Tower of Oromet"
  building_wonder_oromet_02_desc:0 "While we have no need to look upon Valinor or ensuring that the Elves do not land in Númenor, the Tower of Oromet still is a reminder of what Númenor was in its past, and restoring it is one more step into restoring our former glory."
 
  building_type_wonder_nindamos_01:0 "City of Nindamos"
  building_type_wonder_nindamos_01_desc:0 "Nindamos is a city located at the mouth of the Siril river, it was founded by Cemendur, great-grandson of Vardamir Nólimon, during his time as the representative of Mittalmar in the Council of the Sceptre, although Nindamos had been small fishing village before this. Nindamos was the most important city in the South of Númenor as it provided fish for Númenor, which would be salted and given to its sailors when they went on long voyages."
  building_wonder_nindamos_01:0 "Town of Nindamos"
  building_wonder_nindamos_01_desc:0 "While Nindamos was not hit as hard by the Downfall as other areas were, it was still humbled during the Akallabêth, and while it quickly recovered as it was an important fishing point for Númenors fishing industry, it still never regained all of its old splendour."
  building_wonder_nindamos_02:0 "City of Nindamos"
  building_wonder_nindamos_02_desc:0 "Nindamos has now regained its old splendour and glory, every day dozens of ships leave its port and its markets are filled with the most exquisite collection of seafood in all of Middle Earth, peasants, merchants and nobles all visit Nindamos to purchase from its great market."
 
  building_type_wonder_ondosto_01:0 "Great Quarries of Ondostó"
  building_type_wonder_ondosto_01_desc:0 "Ondostó was originally founded as a village for Quarry workers, although the popularity of Ruxöalë gave the village fame, coupled with the necessity for quarrying to expand Númenor's great cities meant that the city thrived. Ondostó was the city which better survived the Akallabêth, and for a time was made the Capital of Númenor as Armenelos was rebuilding, however, the tremors of the Akallabêth destroyed its quarrying industry and has yet to recover."
  building_wonder_ondosto_01:0 "Dead Quarrying Industry"
  building_wonder_ondosto_01_desc:0 "Ondostó was the city which better survived the Akallabêth, and for a time was made the Capital of Númenor as Armenelos was rebuilding, however, the tremors of the Akallabêth destroyed its quarrying industry and has yet to recover, but as Númenor's population has risen over the last decades its fair cities must be expanded and therefore Ar-Balkazîr has shown interest in restoring the quarrying industry of Ondostó."
  building_wonder_ondosto_02:0 "Thriving Quarrying Industry"
  building_wonder_ondosto_02_desc:0 "With the help of the Council of the Sceptre the quarries of Ondostó have been rebuilt and workers have poured into the city from all Númenor, helping restore the city to its former splendour and glory. New days are ahead of us now."
 
  building_type_wonder_meneltarma_01:0 "The Meneltarma"
  building_type_wonder_meneltarma_01_desc:0 "The Meneltarma is the highest point in all of Númenor, it is believed that Aman can be seen from the top of the Meneltarma. The earlier Kings of Númenor had built roads so the three festivals of Eru could be reached by the populace. Later Kings began to neglect the Meneltarma and during the reign of Ar-Pharazôn it was forbidden to go there under pain of death. Ar-Zimraphel went to the Meneltarma during the Akallabêth but the rain had made the steep side too slippery which caused her to fall to her death."
  building_wonder_meneltarma_01:0 "The Pillar of Heaven"
  building_wonder_meneltarma_01_desc:0 "The Meneltarma is the highest point in all of Númenor, it is believed that Aman can be seen from the top of the Meneltarma. The earlier Kings of Númenor had built roads so the three festivals of Eru could be reached by the populace. Later Kings began to neglect the Meneltarma and during the reign of Ar-Pharazôn it was forbidden to go there under pain of death. Ar-Zimraphel went to the Meneltarma during the Akallabêth to ask Eru to spare Númenor but the rain had made the steep side too slippery which caused her to fall to her death."
  building_wonder_meneltarma_02:0 "The Pillar of the Fallen"
  building_wonder_meneltarma_02_desc:0 "After the Akallabêth, Ar-Zimraphel's body was found and entombed at Noirinan and the Meneltarma became a holy site once more, with the Kings seeing its full restoration. After the Second Númenorean Civil War and the rise of the Adûnabên the Meneltarma became a site of not just worship but rememberance to all those had fallen under the Shadow."
 
  building_type_wonder_andunie_01:0 "Andúnië"
  building_type_wonder_andunie_01_desc:0 "Andúnië is the chief city of Andustar, the former city of the House of Elatan, having been founded by Elatan's father, Númendil."
  building_wonder_andunie_01:0 "Andúnië: Chief Haven of the Faithful"
  building_wonder_andunie_01_desc:0 "Andúnië is the chief city of Andustar, one of the regions of Númenor and the former residence of the house of Elatan. Andúnië was founded by Elatan's father, Númendil to be a harbour for the Eldar that visited Númenor. During the reign of Tar-Ancalimon I, Andúnië became the chief settlement of the Elendili as persecution agains them increased. During the reiign of Ar-Gimilzôr, Andúnië's population was relocated to Rómenna which left the city as a ghost town. Andúnië was left a ruin by the Akallabêth."
  building_wonder_andunie_02:0 "Andúnië: Capital of Andustar"
  building_wonder_andunie_02_desc:0 "While Andúnië has been rebuilt and is now a functioning city, it still has not fully recovered from the Akallabêth. Reconstruction of the city was not a priority for the Kings of Númenor due to its position, coupled with Erest being made the Chief city of Andustar led to Andúnië experiencing a decline until the Second Númenorean Civil War, in which its strategic military position in the hills of Andustar was seen as useful by Ar-Ancalimon II, and therefore expanded it after the war ended."
  building_wonder_andunie_03:0 "Andúnië Reborn"
  building_wonder_andunie_03_desc:0 "Now that Andúnië has been rebuilt to its former splendour the city has experienced a boom in population and inland trade, the quarries of Forostar and the farms of the Nunduinë have granted the city a new life, and while it is no longer visited by the Eldar, their wisdom still remains in this mighty city of the west."
 
  building_type_wonder_eldalonde_01:0 "Eldalondë"
  building_type_wonder_eldalonde_01_desc:0 "Eldalondë: Haven of the Eldar"
  building_wonder_eldalonde_01:0 "Eldalondë the Beautiful"
  building_wonder_eldalonde_01_desc:0 "Eldalondë was founded by Vëantur, Captain of the King's Ships during the reign of Tar-Elendil and grandfather to Tar-Aldarion I. Eldalondë was built around the Nísimaldar, the only region in the realms of men where Mallorn trees grew, these mallorn trees were gifted by the Eldar, whom the city was named after. During the reign of Ar-Pharazôn the Mallorn Trees were cut down to be used for the Great Armament. During the Akallabêth the city was destroyed by the waves and tremors."
  building_wonder_eldalonde_02:0 "Eldalondë: Capital of Nísimaldar"
  building_wonder_eldalonde_02_desc:0 "Although Eldalondë has seen better days, ever since the line of Vëantur has been restored in Nísimaldar the city has seen a boom in population and riches, taking advantage of the fertile Nunduinë valley which has made it the breadbasket of Númenor the city has been rebuilt with care. The Eldar may no longer visit this fair city but their wisdom and knowledge survives, when people enter Nísimaldar they believe they have entered one of the Elven realms."
  building_wonder_eldalonde_03:0 "The Mallorn Trees"
  building_wonder_eldalonde_03_desc:0 "Now that we have regained contact with Middle Earth we have sent an expedition to Lórien, where saplings of the Mallorn Trees have been obtained after a deal and have now been sent to Eldalondë, where they will be planted. Once more Nísimaldar shall be the fairest county in the Westerlands."
 
  building_type_wonder_erendis_01:0 "White House of Erendis"
  building_type_wonder_erendis_01_desc:0 "The White House of Erendis, wife of Tar-Aldarion I"
  building_wonder_erendis_01:0 "White House of Erendis"
  building_wonder_erendis_01_desc:0 "The White House of Erendis was built for Erendis by Tar-Meneldur as a gift for the betrothal to his son, Aldarion. The White House was located in the region of Emerië, known for its rolling hills and green plains. Tar-Ancalimë spent most of her childhood in The White House of Erendis, before moving to Armenelos. The House survived the Akallabêth as it was in the hills of Mittalmar but it was abandoned until the reign of Ar-Inziladûn, who gave it to his sister, Princess Zimraphel. After her death the House was not abandoned and instead given to the King of Númenor to be used as a summer residence."