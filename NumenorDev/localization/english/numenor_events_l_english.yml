 numenor.3300.title:0 "The Future of Pelargir"
 numenor.3300.desc:0 "Having welcomed and heard the petitions of the Pelargirean nobles, we have yet to come to a decision on the future of Pelargir, and Gondor. The plan that they propose will begin a complete reformation of Gondor's political system, which over the centuries has become increasingly centralised on Anórien and Ithilien, neglecting cities such as Dol Amroth and Pelargir, this greatly favoured the Kings of Gondor and the Ruling Stewards, but fair Armenelos is further away than Minas Anor and old Osgiliath, and therefore a compromise must be made on how they will be governed.\n\nHearing arguments from both sides, those that want to reform the old colonial political systems, claiming that it would benefit the wealth of Númenor more since a reformed League would be better at taxing our subjects in the Anduin versus those that wish to maintain the current one, claiming that the old colonial systems were too corrupt, and would only benefit the merchants, while the army would suffer from a lack of levies, the Ar- has yet to decide and as the council of the sceptre remains divided on the issue, it seems that a decision on the matter will not be decided soon unless the Ar- decides."
 numenor.3300.a:0 "The League shall be restored"
 numenor.3300.a.tt:0 "The League of Pelargir is restored"
 numenor.3300.b:0 "Why break what works?"
 numenor.3300.b.tt:0 "The League of Pelargir is not restored"
 
