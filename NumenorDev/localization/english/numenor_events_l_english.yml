l_english:

 ###############################
 #### Numenorean Reclamation ####
 ###############################
 
 numenor.1000.t:0 "Reclamation of Umbar"
 numenor.1000.desc:0 "Umbar has finally been brought back under our control, we have sent our engineers to repair the old harbour, having fallen in ruin due to many raids and lack of funds by the local folk, the city itself is a ruin, you would not be able to tell it was once a mighty haven of Númenor, if not for the rare building that still stands. The local Lord, claims to be a descendant of Elros, through Castamir of Gondor, and if so, will be a useful ally in controlling this wild people; the Haradrim have no love for us, but we do not need them to love us, only to obey us. The Haven of Ancalimon has been reclaimed from the barbarians!"
 numenor.1000.a:0 "Let us restore this Great Haven"
 numenor.1000.a.tt:0 "Umbar has been brought back under the control of Númenor"
 
 numenor.1001.t:0 "Reconquest of Umbar"
 numenor.1001.desc:0 "It seems that the Númenoreans want to restore their old Empire. We shall have to increase the defense our borders."
 numenor.1001.a:0 "Umbar is no more"
 numenor.1001.a.tt:0 "Umbar has been brought under the control of Númenor"
 
 numenor.1002.t:0 "The Land of The Sun Reclaimed"
 numenor.1002.desc:0 "Long had Pharazâin been corrupted and feeble, controlled by the Haradrim House of Tumakveh, which pretends to be Adûnaic, how low it had fallen, the Bâitha’n-Kadîr had long stood as a puppet, ignored and forgotten by the Bellakari, and the mighty ports of Pharazâin stood strong, but collapsing after millenia of mistreatment, Korlea, once the mightiest of the ports in the Bay of Tûlwang, is now half-sunken and a shadow of its former self, but no matter, we shall rebuild this mighty land, and bring it back to the greatness it deserves. Our jewel in the Bay of Tûlwang shall be bright once more!"
 numenor.1002.a:0 "The Land of The Sun has been reclaimed for Númenor"
 numenor.1002.a.tt:0 "Pharazâin is now a under the control of Númenor"
 
 numenor.1003.t:0 "Bellakar no more"
 numenor.1003.desc:0 "After an invasion by the Númenoreans, The lands of Bellakar have been declared a Númenórean colony once more with the Bâitha’n-Kadîr replacing the Tumakveh."
 numenor.1003.a:0 "Bellakar is no more"
 numenor.1003.a.tt:0 "Bellakar has been conquered by the Númenoreans"
 
 numenor.1004.t:0 "Thâni-Hazâd United"
 numenor.1004.desc:0 "Thâni-Hazâd had long been a prized possession of the House of Elros, being given to their second sons ever since the sack of Umbar by the Haradrim and Orcs until the Line of Elros there fell to infighting and their remnants were corrupted by the Haradrim which caused the Principality of Zimrathâni to fall and was divided. But in the north, the situation was worse, An-Balkûmagân fell to extremism and debauchery and the mighty Adûnai of the region became a puppet to Khôrahil. After a long military campaign, we have now successfully recovered An-Balkûmagân and Zimrathâni and we shall restore the ports to the Númenórean standard."
 numenor.1004.a:0 "Time to rebuild the Jewels of the south"
 numenor.1004.a.tt:0 "Thâni-Hazâd is now a part of Númenor once more"
 
 numenor.1005.t:0 "The Council of The Seven is No More"
 numenor.1005.desc:0 "It seemed impossible that anyone would unite the Seven Lands, but we have received news from Armenelos that Thâni-Hazâd has been fully occupied by the Númenoreans."
 numenor.1005.a:0 "An Impressive feat, if nothing else"
 numenor.1005.a.tt:0 "Thâni-Hazâd is now a part of Númenor"
 
 numenor.1006.t:0 "Gondor Brought Back Into The Fold"
 numenor.1006.desc:0 "Gondor, the land of Stone, has been succesfully reintegrated into Númenor, quite peacefully, as the Gondorians have showed that they are not barbarians, and that the blood of Númenor still runs strong there. the Ar- has been invited by the local nobility for a tour of the new colony, where at Minas Tirith the Ar- was presented with a sapling of the White Tree, a descendant of Nimloth the Fair, and will be planted at the Palace of the Kings in Armenelos, the restoration of the White Tree marks the end of the Melkorist suffering, their corrupt decisions have been undone, and Isildur the Brave's actions are now known in Númenor."
 numenor.1006.a:0 "Nimloth the Fair, reborn"
 numenor.1006.a.tt:0 "Gondor has been integrated into Númenor"
 
 numenor.1007.t:0 "The Ruin of Gondor"
 numenor.1007.desc:0 "Gondor, the land of Stone, has been attacked from land and sea by the Númenórean Empire and now is a mere colony of Númenor."
 numenor.1007.a:0 "Gondor has fallen"
 numenor.1007.a.tt:0 "Gondor is now a part of the Númenórean Empire"
 
 numenor.1008.t:0 "The Harnen"
 numenor.1008.desc:0 "Named and discovered by Tar-Aldarion, the Harnen was once an important economic artery, being home to great colonies such as Zimralôni, Abârloni and Kadar an-Bêlabâr, these mighty cities dominated the Zâyan an-Khârurush and ensured our trade through the wildlands of Harad was secure. From Tirith Amrûn our Haradric vassals were watched so that they would harbour no delusion of rebellion, however, the machinations of the Dark Lord weakened our colony when Adûnabêth rebelled, and while his rebellion was crushed, the colony suffered but remained as part of our Empire until the Akallabêth, in which we lost it. Now we have restored our rule there and merchants from our Empire have already begun migrating there to trade, the Harnen is once more Númenórean."
 numenor.1008.a:0 "The riches of the Harnen are ours"
 numenor.1008.a.tt:0 "The Harnen region has been reclaimed by the Númenoreans"
 
 numenor.1009.t:0 "The Harnen Free no Longer"
 numenor.1009.desc:0 "The Harnen, one of the most important trade routes in Middle Earth, has been conquered by the Númenoreans as part of their so-called 'Anti-Piracy' Expedition."
 numenor.1009.a:0 "The Spoils of the Harnen are now those of Númenor"
 numenor.1009.a.tt:0 "The Harnen region is now a part of the Númenórean Empire"
 
 numenor.0010.t:0 "The Memorial to the Fallen"
 numenor.0010.desc:0 "Every half a decade a memorial is held at the Meneltarma, our holiest ground, to remember the victims of the Melkorist lies which caused the Akallabêth, the greatest tragedy in Númenórean history, the Melkorist unwillingness to compromise which caused the First Númenórean Civil War and the Melkorist will to survive which caused the Second Númenórean Civil War. Each of those conflicts have been caused by the forces of darkness and while we have won, all have come at a cost, our people have suffered greatly and for them we hold this memorial, to ensure that evil will never return and to remember our struggle to free ourselves from evil."
 numenor.0010.a:0 "It is done"
 numenor.0010.a.tt:0 "A Memorial has been held in the Meneltarma"
 
 numenor.0001.t:0 "What shall we do with these Heretics?"
 numenor.0001.desc:0 "The Council of the Sceptre has been summoned at Armenelos to decides our course of action, while most agree that destroying should be course of action some argue that invading those rocky fortified islands is not worth our time whereas other agree that we shouldn't expose ourselves to the outside world just yet. What course of action shall the Ar- take?"
 numenor.0001.a:0 "We shall destroy them"
 numenor.0001.a.tt:0 "Númenor gains a claim on Tol Uialgaer"
 numenor.0001.b:0 "We shall negotiate"
 numenor.0001.b.tt:0 "Númenor offers the Ar Adûnaim vassalage"
 numenor.0001.c:0 "They are not worth our time"
 numenor.0001.c.tt:0 "Númenor leaves them alone"
 
 numenor.0002.t:0 "Númenor Sends An Ultimatum"
 numenor.0002.desc:0 "It seems that we were wrong about the sinking, emissaries from Númenor have demanded that we bend the knee to them, they could be lying about Númenor having not sunk or maybe they are telling the truth, what shall we do?"
 numenor.0002.a:0 "Whoever they are, they have more ships than Umbar, we shall bend the knee to our fellow Adûnai"
 numenor.0002.a.tt:0 "Ar Adûnaim stops existing, becomes a colony of Númenor"
 numenor.0002.b:0 "We are the true heirs of Anadûnê, we shall not abandon our noble cause"
 numenor.0002.b.tt:0 "Ar Adûnaim refuses Númenor"
 
 numenor.0003.t:0 "The Kingdom of Númenor"
 numenor.0003.desc:0 ""The Edain came at last over leagues of sea and saw afar the land that was prepared for them, Andor, the Land of Gift, shimmering in a golden haze. Then they went up out of the sea and found a country fair and fruitful, and they were glad."\n\nNúmenor was once the greatest Empire in Arda yet after the Akallabêth we lost our colonies and our people suffered, the Melkorists tried to keep their power in Armenelos claiming to be regents of Ar-Pharazôn but they were defeated and vanquished, but that was not the end of them as in the year 2209 of the Third Era, Ar-Balkumagân II tried to bring back our people into the darkness and depravity until he was stopped by Ar-Ancalimon II. After the end of the Second Númenórean Civil War our greatest scholars were sumonned by Ar-Vëantur in order to end all strife and eversince we have known peace and prosperity. It is now the year 3000 of the Third Era, 3122 years after the Akallabêth and Númenor is ruled by Ar-Balkazîr, having succeeded his father, Ar-Inziladûn fifty-one years ago he rules Númenor in a time of prosperity and splendour he know wishes to expand his realm back into Middle Earth."
 numenor.0003.a:0 "The Star of Eärendil will show us the way"
 numenor.0003.a.tt:0 "Guide Númenor back to greatness"
 
 numenor.0200.t:0 "The Lord of Nísimaldar"
 numenor.0200.desc:0 "The House of Vëantur is one of the oldest Númenórean dynasties, having been founded during the reign of Tar-Elendil, we have been the Lords of Nísimaldar and the Princes of Belfalas, that was until our cousins forsaked their Númenórean lineage and adopted the ways of lesser people which made, Alphros, brother of Imrazôr, created the Falmaradal, a group of mercenaries in Gondor which only welcomed the purest Dunédain, while they gained the reputation for being the fiercest fighters in all of Gondor, the people mocked them for they thought of them as a reminder of Castamir and the Kin-Strife.\n\nMy father, Haldrahir, spent much of his time hunting down corsair ships to protect the coasts of Gondor, yet he received no praise from the Stewards, one day he ventured too far after chasing those wretched Haradrim to Mardrûak, it was at that point that a mighty storm threw his ship off course, causing him to end in Orrostar. My father would have been killed had he been of the blood of lesser man, but when the Ar- recognized that he was a Númenórean he was welcomed as an honoured guest, and in time, he proved he was a descendant of Vëantur, and was given Nísimaldar and the Ar-'s daughter in exchange for loyalty and information about Middle Earth .\n\nI am Lord Ciryandur, Lord of Nísimaldar and rightful Prince of Belfalas, the Falmaradal that once backed the claim of my line are long gone, but with enough support from my fellow Adûnai we shall retake Belfalas and restore the greatness of our house."
 numenor.0200.a:0 "The House of Vëantur has not yet fallen!"
 numenor.0200.a.tt:0 "Conquer Belfalas and make it a part of Mighty Númenor once more"
 
 numenor.0230.t:0 "The Lord of Andúnië"
 numenor.0230.desc:0 "Ever since Silmariën married Elatan the Lordship of Andúnië have been justly ruled by the house of Elatan. During the dark days in which the King's Men harshly ruled this lands we were persecuted until our lands were revoked and we were relocated to Rómenna. Following the Akallabêth our house fled to Ondostó, the temporary capital of Númenor, where all those who wanted to rebuild our Kingdom once more united under the banner of Ar-Cemendur, following the victory of the Adûnawan in the Civil War Ar-Cemendur granted Andúnië once more to the House of Elatan, yet the fair city was a shadow of its former self for the waves of the Akallabêth had destroyed the city and collapsed the tower of Oromet, yet for as long as Númenor survived, so would Andúnië.\n\nOver the years the city was rebuilt and our lands restored with the help of the great quarries of Forostar. It is now the year 3000 of the Third Era, while Andúnië has been rebuilt a schism has grown in our House, should we continue to be adherents of the Adûnabên or shall we return to our ancient ways?"
 numenor.0230.a:0 "We shall always be loyal to the Kings of Númenor"
 numenor.0230.a.tt:0 "We shall not forsake our oath to Ar-Vëantur"
 numenor.0230.b:0 "We shall not forsake our legacy"
 numenor.0230.b.tt:0 "We revert back to our old ways"
 
 numenor.0240.t:0 "The House of Vardur"
 numenor.0240.desc:0 "The House of Vardur, also known as the Vardurionath, are the Lords of Hyarrostar and have been since the Oath of Imrazôr, in which he converted to the Númenórean faith and took the name Vardur, to honour his distant relative.\n\nDuring the Second Númenórean Civil War the House of Vardur supported Ar-Ancalimon and gave refuge to many of his troops in Hyarnórë, after the war ended Ar-Ancalimon ordered the construction of a port there which he financed himself, he did this to reward the Vardurionath and also because he saw the strategical importance of the region, the city was named Opele Ancalimonva (Q. "Ancalimon's City") and grew to be the chief city of Hyarrostar. By the reign of Ar-Inziladûn the city hosted the Southern Númenórean Navy, and the Vardurionath were made responsible for the Southern Navy, therefore giving them more power and influence. It is now the year 3000 of the Third Era, and Lord Zôrzagar has offered Ar-Balkazîr aid in expanding the Empire back into Middle-Earth by conquering Umbar, to which the King has said yes. Time will tell if the Vardurionath shall remain loyal or will revert back to their ancient ways."
 numenor.0240.a:0 "We will never betray the Line of Elros and the Oath of Imrazôr"
 numenor.0240.a.tt:0 "We shall loyally aid Ar-Balkazîr"
 numenor.0240.b:0 "We are the rightful Kings of Anadûnê"
 numenor.0240.b.tt:0 "We shall make Anadûnê great again"
 
 numenor.0250.t:0 "The Heirs of Heruhyarmen"
 numenor.0250.desc:0 "The House of Ciryandur are the lords of Ciryalondë and one of the oldest dynasties in Númenor, being descendants of Elros through a distant female line. While the history of our house has revolved in Orrostar for the last three millenia, we can trace our roots back to Ciryandur, founder of Hazaj Tollin and his descendant, Heruhyarmen, who revolted against the influence of the King's Men but failed. When Heruhyarmen's children were taken back to Númenor they joined the Faithful in Andúnië and after the Akallabêth they fought alongside Ar-Cemendur to restore Númenor, and for that they were rewarded the Lordship of Ciryalondë, which they named after Ciryalondë of Pharazâin (Hazaj Tollin).\n\nDuring the Second Númenórean Civil War the Ciryandurion supported Ar-Ancalimon II and were rewarded with a large part of Orrostar, known as Ciryanórë. It is now the year 3000 of the Third Era, and Ar-Balkazîr wishes to expand Númenor back into Middle-Earth, and he has permission for the Ciryandurion to reclaim Hazaj Tollin. Will the Ciryandurion loyally rebuild their old colony or will the revolt of Heruhyarmen be repeated?"
 numenor.0250.a:0 "We shall recover Hazaj Tollin"
 numenor.0250.a.tt:0 "Grants a claim on Hazaj Tollin"
 
 numenor.0260.t:0 "The Lord of the Nunduinë"
 numenor.0260.desc:0 "The House of Ciryamirionath have ruled the Nunduinë since the days of Tar-Telperiën, and are descendants of Elros through a female line. The early history of the house of Ciryamir is dominated by Khôrahil, who usurped the throne of An-Balkûmagân from his father and murdered him, Khôrahil then revolted against Númenor and the Line of Elros, being aided by the Dark Lord Sauron, while Khôrahil rebelled his wife and sister managed to flee back to Númenor with her children, who returned to the Nunduinë.\n\n Following the Akallabêth the house of Ciryamir suffered in the struggle to restore Númenor but ever since they have ruled faithfuly, with many of the house occupying positions in the King's Council. During the reign of Ar-Dôlguzagar the house of Ciryamirionath were insulted, because a small part of their domain was given over to the restored Nísimaldar, while Ar-Dôlguzagar compensented the Ciryamirionath with expanding their domain to the north, some still believe this insult should not go unpunished, although Ar-Balkazîr has offered us aid in restoring the ancient colony of An-Balkûmagân for Númenor. Should we remain loyal to the Line of Elros or shall we follow in the footsteps of Khôrahil and declare our loyalty to the Dark Lord?"
 numenor.0260.a:0 "We shall recover An-Balkûmagân for the Line of Elros"
 numenor.0260.a.tt:0 "The House of Ciryamirionath remains loyal"
 numenor.0260.b:0 "We pledge our loyalty to the Dark Lord"
 numenor.0260.b.tt:0 "The House of Ciryamirionath follows in the footsteps of Khôrahil"
 
 numenor.3000.t:0 "An Offer from Númenor"
 numenor.3000.desc:0 "During the dark of night a strange vessel made port in Korlea, clearly not from around these parts, for it felt like it belonged in the past, yet you could tell it was new; the ship bears the standard of Númenor, and as we go to welcome it, imposing figures leave the ship, emissaries of Númenor, who have come with an offer for us.\n\nNúmenor has made an interesting offer, they have noted the decline of Korlea and in their minds expected something greater, but they come not to insult us, but rather to offer us a chance to reclaim the greatness of Korlea, for it to stop being the port of the Tumakveh's and for it to become the headquarters of the Bâitha’n-Kadîr, an interesting offer indeed, but one not without risks, as the Tumakveh dynasty would surely react harshly, yet, the Adûnai of Korlea have long awaited a chance to recover our identity, not to pretend to be lesser men, and least of all, equal to them, for we are the only dynasty in Bellakar to have refused to take spouses of lesser blood, something which the Númenoreans have clearly recognised, and as we can claim direct lineage from a Númenórean, they will see us as equals.\n\nThe choice we make will determine the future of not just Korlea, but also Bellakar, we must be decide carefuly."
 numenor.3000.a:0 "Long have the Adûnai of Korlea waited to reclaim their old glory"
 numenor.3000.a.tt:0 "You become a vassal of Númenor"
 numenor.3000.b:0 "Never shall we bend the knee to the Kingdom that supported the Melkorites of Korlea"
 numenor.3000.b.tt:0 "You remain loyal to the Tumakveh"
 
 numenor.3100.t:0 "The Second Coming of Ar-Pharazôn"
 numenor.3100.desc:0 "It is time, I can feel it, I am to be the conqueror of the undying lands, and I shall liberate Pharazôn from Amân the Tyrant, and Êru himself shall repent for not granting our people immortal life.\n\nDuring the day we work on preparing the supplies which we have extracted from all across the island, every Lord in Númenor has contributed to this great cause, be it through their free will or because of my gentle reminders, and by noon all of the western ports of Númenor are all full with the ships of my Great Armament, from Andúnië to Erelondë.\n\nAs we prepare to set sail, many sailors look worried, yet I ensure that their fears are calmed, for I was chosen by Mulkhêr for this mission, I am the second coming of Ar-Pharazôn, and soon to be the Liberator of Men. As the sun begins to set, we depart from Númenor, using the ancient maps to charter a course to the lands of Amân the Tyrant we set sail to the south east, yet as it grows late; I go to my cabin in the Second Alcarondas. During the night I have dreams, I begin to feel a great sense of guilt and fear, and when I wake up, the sailors report that Valinor has not been found, I begin to wonder, I might be the chosen of Mulkhêr, but maybe Ar-Pharazôn did not make it to Valinor, maybe he perished. Now I have two options, as we are nearing the end of our second day at sea, shall we turn back to Númenor, or shall we continue the mission?"
 numenor.3100.a:0 "We must not fail Mulkhêr, we shall continue!"
 numenor.3100.a.tt:0 "You continue searching for Valinor"
 numenor.3100.b:0 "Maybe it would be best to return to Númenor"
 numenor.3100.b.tt:0 "You return to Númenor"
 
 numenor.3102.t:0 "The Return"
 numenor.3102.desc:0 "After making the decision to return to Númenor, the sailors spend the day charting the directions to Hyarnustar, the closest region of Númenor to us, many blasphemous sailors celebrate that we are returning, who are swiftly executed and their bodies thrown overboard, yet in my heart I understand that I have failed Mulkhêr and Ar-Pharazôn, for he is still in the realm fo Amân the Tyrant, imprisoned and tormented daily by the Valar, yet I can do nothing about it, for I am craven.\n\nAfter surviving a ferocious storm, we return to Númenor, the people shocked at the sight of us as we make port, some even insult us from the docks, while others are relieved; but among the crowd a riot breaks out, the Melkorites are demanding that I be executed for treason, and a swift repression takes place.\n\nBy nightfall I return to Armenelos, feeling empty and ashamed, for now I am seen as a madman, yet I am not, for I am the chosen of Mulkhêr - I may have failed him, but we shall try to rectify this mistake, but we need more strength and knowledge first."
 numenor.3102.a:0 "We have failed Mulkhêr"
 numenor.3102.a.tt:0 "You returned to Númenor"
 
 numenor.3101.t:0 "The End of the Second Great Armament"
 numenor.3101.desc:0 "Having decided not to fail this mission, we continue searching the seas for the land of immortality, yet hours pass and all we can see is endless ocean - which makes me wonder if the charting that the sailors did is correct? surely it must be, for why would they hinder their opportunity at achieving what our ancestors could not, as we intensively question some of them, we learn that all have been following the right directions, and we should already be past the point of the ban of the Valar, since the island of Númenor is no longer visible to even those with the keenest of eyesights, yet as far as the eye can see, there is only endless ocean.\n\nAs the sun sets, a heavy precipitation begins to fall, it wakes most of the soldiers sleeping in the lower decks, as the raindrops echo in the ship, but then, a great tempest begins, and starts rocking the ship, some sailors fall into the great sea, and then a great black cloud engulfs the fleet from which we are blinded to our surroundings, yet the screams of the sailors are not muted by this witchcraft, I give the order for the remaining sailors to continue, for clearly this is the work of the Avalôim, the Second Alcarondas quickly leaves the storm, yet we are alone, all other ships had perished, however, there would be no time to mourn, for now I see in the sky an imposing figure, formed from the clouds, and as the figure vanishes a great wave approaches, we have little time to react as it hits our ship, capsizing it, with no ships arround, I now understand, that this is the end."
 numenor.3101.a:0 "And so it ends"
 numenor.3101.a.tt:0 "The Second Great Armament has ended in failure"
 
 numenor.3201.t:0 "An Ultimatum to the Dâr"
 numenor.3201.desc:0 "In the towering halls of the palace of Armenelos, the King of towering pride held court. Cloaked in regal vestments adorned with the emblems of Númenor's storied heritage, the King bore an air of unquestionable authority. His gaze, keen and unyielding, bore witness to the splendors of his dominion and the loyal subjects that knelt before him. A man of ancestral lineage and unwavering belief in his realm's supremacy, and wielding Sceptre of Númenor with an imperious resolve.\n\nThe parchment, an extension of his will, bore the royal seal that bore witness to the grandeur of his dynasty. As the inked script flowed across the surface, the King's thoughts were consumed by the conviction that all those beyond the borders of Númenor should bend their knees before the might of his scepter. His eyes, glinting with a mixture of arrogance and certainty, danced across the missive that carried his mandate.\n\nWithin the carefully chosen words, the King conveyed a decree that echoed the resounding refrain of Númenor's perceived supremacy. An ultimatum, borne on wings of power and presumption, unfurled its chilling embrace before the distant realm of Rây. The King's words were a testament to his unswerving belief that the tapestry of nations should be woven under the grand design of Númenor's dominion, each thread yielding to the golden thread of his rule.\n\nAs the messenger departed with the ultimatum in hand, the King's gaze lingered on the horizon, a canvas upon which his influence would soon unfurl. The winds carried his aspirations, tugging at the edges of distant lands, as if bidding them to acknowledge the towering might of Númenor. The King's pride swelled like the cresting waves that lapped against the shores of his kingdom, driven by an intoxicating blend of heritage and authority."
 numenor.3201.a:0 "Send a delegation to Bôzisha-Dâr"
 numenor.3201.a.tt:0 "You will offer that Rây becomes your protectorate"
 
 numenor.3202.t:0 "An Ultimatum from Númenor"
 numenor.3202.desc:0 "In the opulent chambers of his palace, the King of the Rây; cloaked in silken robes that bore the hues of saffron and gold, his countenance displayed a blend of solemnity and trepidation as the missive from Númenor was unfurled before him.\n\nAs the weighty words flowed like a river of ink across the parchment, the King's heart sank, burdened by the gravity of the decision he now faced. The dulcet melodies of court musicians, which once resonated with jubilation, now seemed muted in the face of this foreboding demand. The flickering candlelight cast elongated shadows upon the walls, a stark juxtaposition to the King's resplendent regalia.\n\nThe ultimatum, etched in eloquent script, implored the Rây to kneel in submission and pay homage to the distant shores of Númenor as a tributary. The royal seal, embossed upon the parchment, bore a semblance of authority that seemed to stretch across the vast expanse of oceans and continents. The words held an air of expectancy, an ominous echo of consequences undisclosed.\n\nThe King's thoughts raced like a monsoon storm, grappling with the enormity of this pivotal crossroads. The land he governed, a realm of rich traditions, vibrant culture, and storied heritage, now stood at the precipice of a paradigm shift. The echoes of his ancestors, who had stood resolute against the tides of time, seemed to reverberate through the chambers, urging him to forge a path true to his legacy.\n\nYet, the tendrils of apprehension coiled around his heart, for the power of Númenor was as enigmatic as the constellations that adorned the night sky. The world beyond his borders whispered tales of the Númenórean dominion, tales painted with both admiration and awe, tales that invoked reverence and trepidation in equal measure.\n\nThe King knew that a choice lay before him – to bow to the ultimatum, to tread the path of submission and pledge allegiance to a distant realm, or to stand firm, to bear the weight of potential conflict and resist the siren call of submission. The confluence of tradition and the unknown created a tempestuous tempest in his heart, and as he closed his eyes, he could almost hear the whispers of his ancestors intertwining with the ghostly voices of Númenor's emissaries.\n\nIn the shadowed chamber, the King's gaze fell upon the ultimatum once more. The flicker of determination illuminated his eyes, and amidst the trepidation that lingered in the air, a resolute ember of defiance sparked to life. The ultimatum might have reached his hands, but the fate of his realm was far from decided. With a steady hand and a heart laden with the weight of his ancestors' legacy, the King would script the next chapter of his land's history, one that would be defined by the choices he made in the face of the Númenórean ultimatum."
 numenor.3202.a:0 "Rây rejoices that the Kralyi has returned"
