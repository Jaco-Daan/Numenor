 numenor.2001.desc: "Placeholder"
 numenor.2001.a: "Placeholder"

 numenor.2002.a.failure.tt: "Placeholder"
 numenor.2002.a.positive.odds: "Placeholder"
 numenor.2002.a.negative.odds: "Placeholder"
 numenor.2002.t: "Placeholder"
 numenor.2002.desc: "Placeholder"
 
 numenor.3000.t: "An Offer From Númenor"
 numenor.3000.desc: "During the dark of night, a strange vessel made port in [GetTitleByKey('d_korlea').GetNameNoTier]. Clearly it was no common ship of these coasts, for though newly wrought, it seemed as though it had sailed from another age. Upon its sails was borne the standard of [numenor|E], and as we went to receive it, tall and solemn figures descended from the vessel — emissaries of Westernesse, bearing an offer.\n\nThe Númenóreans spoke candidly of Korlea’s decline. Once they had expected greatness from this harbor of the Adûnâi, yet they claimed they had not come to mock its fading fortunes, but to offer renewal. They proposed that Korlea cease to be merely the port of the [GetScriptedCharacterByHistoryID('lineoftumakveh0').GetDynasty.GetName], and instead become the seat of the Bâitha'n-Kadîr, a restoration of ancient Adûnai learning, tradition, and authority.\n\nIt is an offer fraught with danger. The Tumakveh dynasty would surely regard such a transformation with hostility. Yet many among the Adûnai of Korlea have long yearned to reclaim the heritage of their forefathers and preserve the customs of [anadune|E], which across Bellakar have slowly faded beneath foreign influence and the passage of time. The Númenóreans see in our line not purity of blood, but continuity of tradition, for ours is among the few dynasties to have steadfastly preserved the old rites, laws, and memory of Westernesse.\n\nThe choice before us shall shape not only the future of Korlea, but perhaps that of all Bellakar. We must decide with great care." #AI PLACEHOLDER
 numenor.3000.a: "Long have the Adûnai of Korlea waited to reclaim their old glory."
 numenor.3000.a.tt: "You become a vassal of Númenor"
 numenor.3000.b: "Never shall we bend the knee to the Kingdom that supported the [GetFaithByKey('melkorite').GetAdherentName] of [GetTitleByKey('d_korlea').GetNameNoTier]."
 numenor.3000.b.tt: "You remain loyal to the [GetScriptedCharacterByHistoryID('lineoftumakveh0').GetDynasty.GetName]"
 
 numenor.3100.t: "The Second Coming of Ar-Pharazôn"
 #numenor.3100.desc: "It is time, I can feel it, I am to be the conqueror of the undying lands, and I shall liberate [pharazon|E] from [aman|E] the Tyrant, and [eru|E] himself shall repent for not granting our people immortal life.\n\nDuring the day we work on preparing the supplies which we have extracted from all across the island, every Lord in [numenor|E] has contributed to this great cause, be it through their free will or because of my gentle reminders, and by noon all of the western ports of Númenor are all full with the ships of my Great Armament, from [GetTitleByKey('d_andunie').GetNameNoTier] to [GetTitleByKey('d_erelonde').GetNameNoTier].\n\nAs we prepare to set sail, many sailors look worried, yet I ensure that their fears are calmed, for I was chosen by [mulkhercharacter|E] for this mission, I am the second coming of [GetScriptedCharacterByHistoryID( 'lineofelros28' ).GetTitledFirstNameRegnal], and soon to be the Liberator of Men. As the sun begins to set, we depart from Númenor, using the ancient maps to charter a course to the lands of Aman the Tyrant we set sail to the south east, yet as it grows late; I go to my cabin in the Sattaglarrâma. During the night I have dreams, I begin to feel a great sense of guilt and fear, and when I wake up, the sailors report that [valinor|E] has not been found, I begin to wonder, I might be the chosen of Mulkhêr, but maybe Ar-Pharazôn did not make it to Valinor, maybe he perished. Now I have two options, as we are nearing the end of our second day at sea, shall we turn back to Númenor, or shall we continue the mission?"
 numenor.3100.desc: "It is time. I can feel it - I am to be the conqueror of the [undyinglands|E]. The forces of the Isle shall liberate [pharazon_golden|E] from [aman|E] the Tyrant, and even [erutheone|E] shall be overmastered. We will take the gift of immortality from His outstretched hand, as He bends before us in supplication!\n\nThough some have needed gentle coercing, the lords of all [anadune|E] have rendered my Armament with a great many soldiers and slaves, and more supplies than I can count. From $d_erelonde$ to $d_andunie$, from the smallest fishing port to the berth of kings past, all are readied with ships and weapons of war by noon.\n\nI can tell that many of my sailors, loyal to the Scepter and yet lesser men than those of the Line of Kings, are worried about our failure. But I am [mulkhercharacter|E]'s chosen! The Lord of the Earth has provided me divine guidance to assail the West and liberate [men|E].\n\nAs I sleep on the gently rocking [Glossary('Sattaglarrâma','sattaglarrama_gloss')], now far out at sea and gently leading the other ships West, I have terrible dreams which I cannot remember, but which plague me throughout the following days. Whispers of death and ruin follow my every word, and the sea grows ever stormier. I fear I have made a mistake.\n\nValinor has not been found after more than a week of sailing. I might be the chosen of Mulkhêr, but it is possible [pharazon|E] did not make it to the Amatthâni - maybe he perished... and maybe we shall do the same!\n\nI have two options - shall we turn back to Anadûnê, or shall we continue the mission?" # Rewrite
 numenor.3100.a: "We cannot fail Mulkhêr, we shall continue!"
 numenor.3100.a.tt: "You continue searching for Valinor"
 numenor.3100.b: "Maybe it would be best to return to Anadûnê..."
 numenor.3100.b.tt: "You return to Númenor"
 
 numenor.3102.t: "The Return"
 #numenor.3102.desc: "After making the decision to return to [numenor|E], the sailors spend the day charting the directions to Hyarnustar, the closest region of Númenor to us, many blasphemous sailors celebrate that we are returning, who are swiftly executed and their bodies thrown overboard, yet in my heart I understand that I have failed [mulkhercharacter|E] and [GetScriptedCharacterByHistoryID( 'lineofelros28' ).GetTitledFirstNameRegnal], for he is still in the realm fo [aman|E] the Tyrant, imprisoned and tormented daily by the [valar|E], yet I can do nothing about it, for I am craven.\n\nAfter surviving a ferocious storm, we return to Númenor, the people shocked at the sight of us as we make port, some even insult us from the docks, while others are relieved; but among the crowd a riot breaks out, the [GetFaithByKey('melkorite').GetAdherentNamePlural] are demanding that I be executed for treason, and a swift repression takes place.\n\nBy nightfall I return to [GetTitleByKey('c_armenelos').GetNameNoTier], feeling empty and ashamed, for now I am seen as a madman, yet I am not, for I am the chosen of Mulkhêr - I may have failed him, but we shall try to rectify this mistake, but we need more strength and knowledge first."
 numenor.3102.desc: "We have decided to return to [numenor|E], land of Kings and Lords of [men|E]. Our ships are heavy, but not with the loot of Amatthâni - rather, those blasphemous sailors and slaves who celebrated our failure have been... dispossessed of their movement, and will be sacrificed to the Temple upon our return. But though we come bearing gifts to [mulkhercharacter|E], my heart is heavy - we have failed His ultimate task, and [pharazon|E] yet remains in the grasp of [aman|E]. No doubt the suffering that awaits my prisoners is a pittance compared to the devious tortures of the [eldar|E] and [ainurgods|E]. And yet, there is nothing I can do, for I am a craven in the eyes of my people and myself.\n\nWe make port and arrive at the scene of a riot, where the servants of Mulkhêr, the citizens of my own Númenor, demand my deposition and sacrifice. So, my guards must raise blades against those who share in our worship while I hasten to return to $cn_armenelos_adunaic$ and contemplate my failure.\n\nBy nightfall I am in $cn_armenelos_adunaic$, feeling empty and ashamed. While I slit the throat of servant brought before me as a personal sacrifice to Mulkhêr, I ponder on His mission. I am not a madman, though my people may think it so - I am the chosen of Mulkhêr. I may have failed him now, but we #bold shall#! rectify this mistake. We must." # Rewrite
 numenor.3102.a: "We have failed Mulkhêr..."
 numenor.3102.a.tt: "You returned to Númenor"
 
 numenor.3101.t: "The End of the Second Great Armament"
 #numenor.3101.desc: "Having decided not to fail this mission, we continue searching the seas for the land of immortality, yet hours pass and all we can see is endless ocean - which makes me wonder if the charting that the sailors did is correct? surely it must be, for why would they hinder their opportunity at achieving what our ancestors could not, as we intensively question some of them, we learn that all have been following the right directions, and we should already be past the point of the ban of the [valar|E], since the island of [numenor|E] is no longer visible to even those with the keenest of eyesights, yet as far as the eye can see, there is only endless ocean.\n\nAs the sun sets, a heavy precipitation begins to fall, it wakes most of the soldiers sleeping in the lower decks, as the raindrops echo in the ship, but then, a great tempest begins, and starts rocking the ship, some sailors fall into the great sea, and then a great black cloud engulfs the fleet from which we are blinded to our surroundings, yet the screams of the sailors are not muted by this witchcraft, I give the order for the remaining sailors to continue, for clearly this is the work of the Avalôim, the Sattaglarrâma quickly leaves the storm, yet we are alone, all other ships had perished, however, there would be no time to mourn, for now I see in the sky an imposing figure, formed from the clouds, and as the figure vanishes a great wave approaches, we have little time to react as it hits our ship, capsizing it, with no ships arround, I now understand, that this is the end."
#  numenor.3101.desc: "The Armament sets out to the West, our ships the only company within leagues and leagues of Ocean. Were [pharazon|E]'s maps wrong? We are the greatest sailors that the world has ever known, far surpassing the [telerielves|E] and [falathrim|E], and we have sailed far enough away from [numenor|E] that we can no longer see her, not even those of keenest sight. Perhaps [valinor|E] has disappeared? Perhaps Pharazôn won?\n\nBut as the sun sets, rain starts falling heavily upon the deck, almost beginning to flood the lower levels of the ships. Sailors crowd upon the upper floors, and huddle under whatever shelter they can find, whether it be their shields or cloaks. Slaves, of course, are sent to the lower floors to bail out the ships - whether they lose their lives in the process is of no great concern. But those lashed to the poles find themselves the luckiest, as a great tempest nearly rises out of the sea - a gale-force of water inbound for our ships. Those of weak heart and quavering leg find themselves jumping or flying overboard, while the rest of us duck and cover where we can.\n\nWhen we next rise out of the storm, the [Glossary('Sattaglarrâma','sattaglarrama_gloss')] is the only ship left - all others have been destroyed utterly by the storm. Great [mulkhercharacter|E] has preserved us!\n\nBut then I see a great figure in the grey storm-ridden sky. As it vanishes, so comes a great wave. My sailors scream and jump, but I cannot move an inch - I can only watch as the mighty wave approaches, taller than ten ships atop each other, crowned with blood-red foam and lightning, and howling with the scream of a thousand-thousand angry ghosts. \n\nThen I understand, as the Sattaglarrâma begins to crack and splinter, and as the water engulfs me, that this is #boldthe end#!." # Rewrite
#  numenor.3101.a: "The Sea is always right..."
#  numenor.3101.a.tt: "The Second Great Armament has ended in failure"
 numenor.3101.desc: "The Great Armament set out to the West, our mighty ships alone upon the Sundering Seas. Were [pharazon|E]'s maps astray? We are the greatest mariners that the world has ever known, far surpassing the [telerielves|E] and [falathrim|E], yet we found naught but endless waters. Have the [valar|E] hidden in fear? Has [valinor|E] been removed from the circles of the world? A bitter wrath boils among the crew of the [Glossary('Sattaglarrâma','sattaglarrama_gloss')]—we sailed to claim our rightful immortality, only to be mocked by the empty horizon.\n\nYet, as we curse the silent sky, a sudden and unnatural stillness falls upon the sea. The wind dies, and a profound dread takes root in my heart. It is not fear of the void before us, but a chilling doom pulling from behind. [numenor|E]... A shadow lies upon our home. Even the priests of [mulkhercharacter|E] fall silent as the air takes on the bitter taste of ash. Putting aside our thwarted pride, I order the fleet to come about. We must return to the Isle of Kings.\n\nWe drive the slaves at the oars without pity, racing against a darkness we cannot name. When at last the great peak of the Meneltarma pierces the horizon, my heart knows no joy, only despair. The sky above our glorious realm is bruised and bleeding, choked with the smoke of ruin.\n\nAs we draw nearer, the true doom of our people is revealed. Great chasms rend the coastal havens, swallowing our majestic towers into the abyss. The very earth shudders and groans in agony, and I can but watch in silent horror as mountainous walls of water crash upon the shores, dragging our splendor into the churning deep. We sought to conquer the lords of the West, but as I watch my homeland drowning beneath the waves, I know in my soul that this is #bold the end of all things#!." #AI PLACEHOLDER
 numenor.3101.a: "What doom have we brought upon ourselves...?" #AI PLACEHOLDER
 numenor.3101.a.tt: "The Downfall of Númenor has begun" #AI PLACEHOLDER
 
 numenor.3103.t: "Echoes of the Abyss" #AI PLACEHOLDER
 numenor.3103.desc: "Five years have passed since the sea rose in wrath to punish our pride, and the very foundations of the world were fractured. The face of [numenor|E] is forever marred. Where our proudest havens once stood in glory, jagged cliffs and bitter marshes now lie, choked with the wreckage of our hubris. We have spent half a decade pulling our lives from the mud and ash of our ruined realm.\n\nThere are times when the earth remains still, long enough for us to lay new stones, plant in the blighted soil, and whisper of restoration. The surviving priests of [mulkhercharacter|E] proclaim that we have weathered the malice of the West, claiming our endurance as proof of our unyielding might. But then, in the dead of night, the deeps shudder once more. A low, guttural groan rattles the stones, collapsing weakened walls and sending the black tides surging unnaturally against our battered shores.\n\nAre we rebuilding a glorious kingdom, or but lingering in a prolonged tomb? We toil under a sky that still weeps bitter, ashen rain. The ocean feels no longer like our conquered domain, but a mighty, coiled serpent biding its time. We have survived the first stroke of doom, but whether the wrath of the gods has passed or is merely gathering breath, none can truly say. We can do naught but watch the darkened horizon, and #bold wait#!."
 numenor.3103.a: "We build upon fractured stone." #AI PLACEHOLDER
 numenor.3103.a.tt: "The future of our people remains precariously in the balance" #AI PLACEHOLDER

 numenor.3105.t: "The Unthinkable Defeat" #AI PLACEHOLDER
 numenor.3105.desc: "For ages uncounted, the hosts of [numenor|E] have brought the world to heel. We were the masters of the sea, the undisputed lords of the earth, untouchable upon our starry isle. Yet today, the unthinkable has come to pass. The ashes of our shattered armies scatter upon the wind, and the banners of a foreign conqueror are raised over our sacred soil.\n\nThis overwhelming power has broken our lines and crushed our grandest defenses. The clash of steel and the cries of the dying have faded into a grim, suffocating silence. We, who once thought ourselves untouchable, now taste the bitter ash of subjugation. The invader marches through our ancestral lands, triumphant and unyielding. As we look upon the ruins of our strength, we are forced to acknowledge a terrifying truth: our pride has been broken, and the Isle of Kings is at the mercy of a greater force." #AI PLACEHOLDER
 numenor.3105.a: "We are masters of the world no longer." #AI PLACEHOLDER

 numenor.3201.t: "An Ultimatum to the Dâr"
 numenor.3201.desc: "Within the towering halls of the palace of [GetTitleByKey('c_armenelos').GetNameNoTier], I hold court clad in regal vestments, the Sceptre of Númenor resting firmly in my grasp. Around me stand my foremost diplomats and captains, while petitioners kneel beneath the gaze of the throne. Great indeed is the inheritance of the Line of [elrosshort|E], though greater still is the burden carried by those who remember the fall of Westernesse.\n\nBefore me lies a parchment — an extension of my will, prepared by the finest scribes of the realm and awaiting only my final decree. My councillors speak in measured tones as final amendments are debated and judgments rendered.\n\nAs the scribes complete their work, my thoughts turn to the long history between the Kingdom of the High Men, [numenor|E], and the harbors of the [ray|E]. In ages past, the Bôzisha-Mîraz stood beneath the friendship and protection of the Sceptre, prospering through trade with the Númenórean havens of the Bay of Tûlwang. Yet after the [akallabeth|E], those bonds were broken, and the memory of the old alliance slowly faded into legend.\n\nBut the heirs of Anadûnê endure still. We do not seek to reclaim the arrogance that brought ruin upon our forefathers, but neither shall we allow the wisdom and order of Westernesse to vanish entirely from the world. This decree shall offer the Dâr an opportunity to renew the ancient bond between our peoples and restore what centuries of division have diminished.\n\nAt last the scribes finish their work. As my messenger departs bearing the sealed ultimatum, I turn my gaze eastward across the sea. Beyond the horizon lie realms long separated from Númenor by time, fear, and forgetfulness. Whether by diplomacy or by strength, the legacy of Westernesse shall endure once more." #AI PLACEHOLDER
 numenor.3201.a: "[GetTitleByKey('c_bozisha_dar').GetNameNoTier] shall soon return to the Sceptre."
 numenor.3201.a.tt: "You will offer that [GetTitleByKey('k_ray').GetNameNoTier] becomes your protectorate"
 
 numenor.3202.t: "An Ultimatum From Númenor"
 numenor.3202.desc: "In the opulent chambers of his palace, the King of the [GetTitleByKey('k_ray').GetNameNoTier]; cloaked in silken robes that bore the hues of saffron and gold, his countenance displayed a blend of solemnity and trepidation as the missive from [numenor|E] was unfurled before him.\n\nAs the weighty words flowed like a river of ink across the parchment, the King's heart sank, burdened by the gravity of the decision he now faced. The dulcet melodies of court musicians, which once resonated with jubilation, now seemed muted in the face of this foreboding demand. The flickering candlelight cast elongated shadows upon the walls, a stark juxtaposition to the King's resplendent regalia.\n\nThe ultimatum, etched in eloquent script, implored the Rây to kneel in submission and pay homage to the distant shores of Númenor as a tributary. The royal seal, embossed upon the parchment, bore a semblance of authority that seemed to stretch across the vast expanse of oceans and continents. The words held an air of expectancy, an ominous echo of consequences undisclosed.\n\nThe King's thoughts raced like a monsoon storm, grappling with the enormity of this pivotal crossroads. The land he governed, a realm of rich traditions, vibrant culture, and storied heritage, now stood at the precipice of a paradigm shift. The echoes of his ancestors, who had stood resolute against the tides of time, seemed to reverberate through the chambers, urging him to forge a path true to his legacy.\n\nYet, the tendrils of apprehension coiled around his heart, for the power of Númenor was as enigmatic as the constellations that adorned the night sky. The world beyond his borders whispered tales of the Númenórean dominion, tales painted with both admiration and awe, tales that invoked reverence and trepidation in equal measure.\n\nThe King knew that a choice lay before him - to bow to the ultimatum, to tread the path of submission and pledge allegiance to a distant realm, or to stand firm, to bear the weight of potential conflict and resist the siren call of submission. The confluence of tradition and the unknown created a tempestuous tempest in his heart, and as he closed his eyes, he could almost hear the whispers of his ancestors intertwining with the ghostly voices of Númenor's emissaries.\n\nIn the shadowed chamber, the King's gaze fell upon the ultimatum once more. The flicker of determination illuminated his eyes, and amidst the trepidation that lingered in the air, a resolute ember of defiance sparked to life. The ultimatum might have reached his hands, but the fate of his realm was far from decided. With a steady hand and a heart laden with the weight of his ancestors' legacy, the King would script the next chapter of his land's history, one that would be defined by the choices he made in the face of the Númenórean ultimatum." # ALRAIN REWRITE
 numenor.3202.a: "Rây... rejoices that the Kralyi has returned."
 numenor.3202.a.tt: "[GetTitleByKey('k_ray').GetNameNoTier] becomes a tributary to [GetTitleByKey('e_numenor').GetNameNoTier]"
 numenor.3202.b: "We shall not become slaves to [GetTitleByKey('c_armenelos').GetNameNoTier] again!"
 numenor.3202.b.tt: "A war begins to make [GetTitleByKey('k_ray').GetNameNoTier] a tributary"
 
 numenor.3300.title: "The Future of Pelargir"
 numenor.3300.desc: "Having welcomed and heard the petitions of the Pelargirean nobles, we have yet to come to a decision on the future of [GetTitleByKey('d_pelargir').GetNameNoTier], and [gondor|E]. The plan that they propose will begin a complete reformation of Gondor's political system, which over the centuries has become increasingly centralised on [GetTitleByKey('k_anorien').GetNameNoTier] and [GetTitleByKey('k_ithilien').GetNameNoTier], neglecting cities such as [GetTitleByKey('k_belfalas').GetNameNoTier] and Pelargir, this greatly favoured the Kings of Gondor and the Ruling Stewards, but fair [GetTitleByKey('c_armenelos').GetNameNoTier] is further away than Minas Anor and old [GetTitleByKey('c_osgiliath').GetNameNoTier], and therefore a compromise must be made on how they will be governed.\n\nHearing arguments from both sides, those that want to reform the old colonial political systems, claiming that it would benefit the wealth of Númenor more since a reformed League would be better at taxing our subjects in the Anduin versus those that wish to maintain the current one, claiming that the old colonial systems were too corrupt, and would only benefit the merchants, while the army would suffer from a lack of levies, the Ar- has yet to decide and as the council of the sceptre remains divided on the issue, it seems that a decision on the matter will not be decided soon unless the Ar- decides."
 numenor.3300.a: "The League shall be restored."
 numenor.3300.a.tt: "The League of Pelargir is restored"
 numenor.3300.b: "Why break what works?"
 numenor.3300.b.tt: "The League of Pelargir is not restored"
 
 numenor.3310.title: "An Interesting Offer"
 numenor.3310.desc: "Before me was the King, resplendent in the regalia of [numenor|E] the Great. In his eyes, a glint of urgency betrayed the gravity of his intent. The King spoke with a voice that resonated through the chamber, asking that I aid him with a matter at hand, and he spoke with honeyed words.\n\n'The Council of the Sceptre is divided, and those who wish for peace with folded hand are set against those who hold their swords close to their hearts. Easy it is to speak of non-aggression - to fall into sloth and indolence. But war will come anyways, and if strife comes to the shores of the Yôzayan, better that we are prepared.'\n\nIn a tone mellifluous, the King continued, 'I offer to you a simple plea of alliance - nothing more and nothing less. For your thoughts are your own, and yet you may be well served by the treasury of Númenor. All you must do is support the cause of my compatriots and I when next the Council convenes. Do this, and I shall exalt your name and the name of your house to the stars!'\n\n I have to make a decision, to support the King's cause and receive a... noble gift, or to stay true to my own opinion on the matter and the actions of the King."
 numenor.3310.a: "This is a most honourable gift..."
 numenor.3310.b: "I shall not sell my dignity!"
 
 blessed_by_meneltarma_modifier: "Blessing of the Meneltarma"
 blessed_by_meneltarma_modifier_desc: "This character has prayed upon the [GetTitleByKey('c_meneltarma').GetNameNoTier]"
 
 flag_meneltarma: "Blessing of the Meneltarma"