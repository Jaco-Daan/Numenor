l_english:
 
 numenor.0001.t: "What Shall We Do With These Heretics?"
 numenor.0001.desc: "The Council of the Sceptre has been summoned at [GetTitleByKey('c_armenelos').GetNameNoTier] to decides our course of action. While much and most of the Council agrees that utterly destroying these blasphemers should be our course of action, some argue that invading those rocky fortified islands is not worth our time and what few Men we may lose there, preferring instead to treat with the [GetTitleByKey('e_adunaim').GetNameNoTier] on friendly, if not equal, footing. Others voice even more conservative opinions, saying that we shouldn't expose ourselves to the outside world just yet. What course of action shall the King take?"
 numenor.0001.a: "We shall destroy them!"
 numenor.0001.a.tt: "Númenor gains a claim on Tol Uialgaer"
 numenor.0001.b: "We shall negotiate."
 numenor.0001.b.tt: "Númenor offers the Ar-Adûnaim vassalage"
 numenor.0001.c: "They are not worth our time."
 numenor.0001.c.tt: "Númenor leaves them alone"
 
 numenor.0002.t: "Númenor Sends An Ultimatum"
 numenor.0002.desc: "It seems that we were wrong about the sinking, emissaries from [numenor|E] have demanded that we bend the knee to them, they could be lying about Númenor having not sunk or maybe they are telling the truth, what shall we do?"
 numenor.0002.a: "Whoever they are, they have more ships than Umbar, we shall bend the knee to our fellow Adûnai."
 numenor.0002.a.tt: "Ar-Adûnaim stops existing and becomes a colony of Númenor"
 numenor.0002.b: "We are the true heirs of Anadûnê, we shall not abandon our noble cause."
 numenor.0002.b.tt: "Ar-Adûnaim refuses Númenor"
 
 numenor.0003.t: "The Kingdom of Númenor"
 numenor.0003.desc: ""The Edain came at last over leagues of sea and saw afar the land that was prepared for them, Andor, the Land of Gift, shimmering in a golden haze. Then they went up out of the sea and found a country fair and fruitful, and they were glad."\n\n[numenor|E] was once the greatest kingdom of [men|E] [arda|E] had ever seen. Yet after the [akallabeth|E], that great flood of the Isle, we lost contact with our colonies and our people suffered greatly. Those who worshipped [mulkhercharacter|E] attempted to keep their power in [GetTitleByKey('c_armenelos').GetNameNoTier], claiming to be regents of [pharazon_golden|E]. They were defeated and vanquished, but not utterly - in the year 2209 of the [thirdage|E], [GetScriptedCharacterByHistoryID( 'lineofelros107' ).GetFirstNameRegnal] tried to bring back our people into worship of the Dark, until he was stopped by his brother, [GetScriptedCharacterByHistoryID( 'lineofelros108' ).GetTitledFirstName].\n\nAfter the end of the Second Númenórean Civil War our greatest scholars were summoned by [GetScriptedCharacterByHistoryID( 'lineofelros109' ).GetTitledFirstName], [GetScriptedCharacterByHistoryID( 'lineofelros108' ).GetFirstNameNoTooltip]'s son in order to end all strife between those who kept the old Faith, and those who wished to rule as Kings in [middleearth|E]. Ever since, we have known much peace and prosperity. It is now the year 3000 of the [thirdage|E], 3122 years after the Akallabêth and Númenor is ruled by [GetScriptedCharacterByHistoryID( 'lineofelros114' ).GetTitledFirstName]. Having succeeded his father [GetScriptedCharacterByHistoryID( 'lineofelros113' ).GetTitledFirstName] fifty-one years ago, he rules Númenor in a time of prosperity and splendour. In [GetScriptedCharacterByHistoryID( 'lineofelros114' ).GetFirstNameNoTooltip]'s deepest dreams, he wishes to expand his realm back into [middleearth|E]."
 numenor.0003.a: "The Star of Eärendil will show us the way."
 numenor.0003.a.tt: "Guide Númenor back to greatness"

 numenor.0010.t: "The Memorial to the Fallen"
 numenor.0010.desc: "Every half a decade a memorial is held at the middle of the [GetTitleByKey('c_meneltarma').GetNameNoTier], our holiest ground and the fane of Eru, to remember the victims of the [GetFaithByKey('melkorite').GetAdherentName] lies which caused the [akallabeth|E]. Known as the greatest tragedy in [numenorean|E] history, the Mulkêrhili unwillingness to compromise also caused the First Númenórean Civil War, and their insidious will to survive caused the Second. Each of those conflicts have been caused by the forces of darkness and while we have won, all have come at a cost. Our people have suffered greatly, so it is for them that we hold this memorial, to ensure that evil will never return and to remember our struggle to free ourselves from evil."
 numenor.0010.a: "It is done."
 numenor.0010.a.tt: "A memorial has been held in the [GetTitleByKey('c_meneltarma').GetNameNoTier]"
 
 numenor.0200.t: "The Lord of Nísimaldar"
 numenor.0200.desc: "The House of [GetScriptedCharacterByHistoryID('lineveantur1').GetFirstName] is one of the oldest [numenorean|E] dynasties, having been founded during the reign of [GetScriptedCharacterByHistoryID('lineofelros4').GetTitledFirstName], we have been the Lords of [GetTitleByKey('d_nisimaldar').GetNameNoTier] and the Princes of Belfalas, that was until our cousins forsaked their Númenórean lineage and adopted the ways of lesser people which made, Alphros, brother of Imrazôr, created the Falmaradal, a group of mercenaries in [gondor|E] which only welcomed the purest [dunedain|E], while they gained the reputation for being the fiercest fighters in all of Gondor, the people mocked them for they thought of them as a reminder of [GetScriptedCharacterByHistoryID('lineofanarion53').GetFirstName] and the Kin-Strife.\n\nMy father, [GetScriptedCharacterByHistoryID('dolamrothsubmod8').GetFirstName], spent much of his time hunting down corsair ships to protect the coasts of Gondor, yet he received no praise from the Stewards, one day he ventured too far after chasing those wretched [haradrim|E] to [GetTitleByKey('k_mardruak').GetNameNoTier], it was at that point that a mighty storm threw his ship off course, causing him to end in [GetTitleByKey('k_orrostar').GetNameNoTier]. My father would have been killed had he been of the blood of lesser man, but when the Ar- recognized that he was a Númenórean he was welcomed as an honoured guest, and in time, he proved he was a descendant of Vëantur, and was given Nísimaldar and the Ar-'s daughter in exchange for loyalty and information about [middleearth|E] .\n\nI am Lord [GetScriptedCharacterByHistoryID('dolamrothsubmod9').GetFirstName], Lord of Nísimaldar and rightful Prince of Belfalas, the Falmaradal that once backed the claim of my line are long gone, but with enough support from my fellow [adunai|E] we shall retake Belfalas and restore the greatness of our house."
 numenor.0200.a: "The House of Vëantur has not yet fallen!"
 numenor.0200.a.tt: "Conquer Belfalas and make it a part of Mighty Númenor once more"
 
 numenor.0230.t: "The Lord of Andúnië"
 numenor.0230.desc: "Ever since [GetScriptedCharacterByHistoryID('lineofelros29').GetFirstName] married [GetScriptedCharacterByHistoryID('lineofelatan1').GetFirstName] the Lordship of [GetTitleByKey('d_andunie').GetNameNoTier] has been justly ruled by the house of Elatan. During the dark days in which the [kingsmen|E] harshly ruled this lands we were persecuted until our lands were revoked and we were relocated to [GetTitleByKey('c_romenna').GetNameNoTier]. Following the [akallabeth|E] our house fled to [GetTitleByKey('d_ondosto').GetNameNoTier], the temporary capital of [numenor|E], where all those who wanted to rebuild our Kingdom once more united under the banner of [GetScriptedCharacterByHistoryID('lineofelros88').GetTitledFirstNameRegnal], following the victory of the [GetFaithByKey('faith_adunaic').GetName] in the Civil War Tar-Cemendur granted Andúnië to [GetScriptedCharacterByHistoryID('lineofelatan25').GetFirstName] of the House of Elatan, yet the fair city was a shadow of its former self for the waves of the [akallabeth|E] had destroyed the city and collapsed the tower of Oromet, yet for as long as Númenor survived, so would Andúnië.\n\nOver the years the city was rebuilt and our lands restored with the help of the great quarries of [GetTitleByKey('k_forostar').GetNameNoTier]. It is now the year 3000 of the [thirdage|E], and while Andúnië has been rebuilt, a schism has emerged in our house.\n\nShould we continue to be adherents of the Adûnabên or shall we return to our ancient ways?"
 numenor.0230.a: "We shall always be loyal to the Kings of Númenor."
 numenor.0230.a.tt: "We shall not forsake our oath to Ar-Vëantur"
 numenor.0230.b: "We shall not forsake our legacy."
 numenor.0230.b.tt: "We revert back to our old ways"
 
 numenor.0240.t: "The House of Vardur"
 numenor.0240.desc: "The House of [GetScriptedCharacterByHistoryID('lineofvardur1').GetFirstName], also known as the Vardurioni, are the Lords of [GetTitleByKey('k_hyarrostar').GetNameNoTier] and have been since the Oath of Imrazôr, in which he converted to the [numenorean|E] faith and took the name Vardur, to honour his distant relative.\n\nDuring the Second Númenórean Civil War the House of Vardur supported [GetScriptedCharacterByHistoryID( 'lineofelros105' ).GetTitledFirstNameRegnal] and gave refuge to many of his troops in [GetTitleByKey('d_hyarnore').GetNameNoTier], after the war ended Ar-Ancalimon ordered the construction of a port there which he financed himself, he did this to reward the Vardurioni and also because he saw the strategical importance of the region, the city was named [Glossary('Londë Ancalimonva','londe_ancalimonva_gloss')] and grew to be the chief city of Hyarrostar. By the reign of [GetScriptedCharacterByHistoryID( 'lineofelros113' ).GetTitledFirstNameRegnal] the city hosted the Southern Númenórean Navy, and the Vardurioni were made responsible for the Southern Navy, therefore giving them more power and influence. It is now the year 3000 of the [thirdage|E], and Lord [GetScriptedCharacterByHistoryID('lineofvardur26').GetFirstName] has offered [GetScriptedCharacterByHistoryID( 'lineofelros114' ).GetTitledFirstName] aid in expanding the Empire back into [middleearth|E] by conquering [umbar|E], to which the King has said yes. Time will tell if the Vardurioni shall remain loyal or will revert back to their ancient ways."
 numenor.0240.a: "We will never betray the Line of Elros and the Oath of Imrazôr."
 numenor.0240.a.tt: "We shall loyally aid Ar-Balkazîr"
 numenor.0240.b: "We are the rightful Kings of Anadûnê."
 numenor.0240.b.tt: "We shall restore Anadûnê to greatness"
 
 numenor.0250.t: "The Heirs of Heruhyarmen"
 numenor.0250.desc: "The House of [GetScriptedCharacterByHistoryID('lineofciryandur1').GetDynasty.GetName] are the lords of [GetTitleByKey('d_ciryanore').GetNameNoTier] and one of the oldest dynasties in [numenor|E], being descendants of [elrosshort|E] through a distant female line. While the history of our house has revolved in [GetTitleByKey('k_orrostar').GetNameNoTier] for the last three millenia, we can trace our roots back to [GetScriptedCharacterByHistoryID('lineofciryandur1').GetFirstName], founder of [GetTitleByKey('d_hazaj_tollin').GetNameNoTier].\n\nHis descendant, [GetScriptedCharacterByHistoryID('lineofciryandur9').GetFirstName], revolted against the influence of the [kingsmen|E] but failed and died in the process. When [GetScriptedCharacterByHistoryID('lineofciryandur9').GetFirstNameNoTooltip]'s children were taken back to Númenor they joined the [faithful|E] in [GetTitleByKey('d_andunie').GetNameNoTier] and after the [akallabeth|E] they fought alongside [GetScriptedCharacterByHistoryID('lineofelros88').GetTitledFirstNameRegnal] to restore Númenor, and for that they were rewarded the Lordship of [GetTitleByKey('c_ciryalonde').GetNameNoTier], which they named after Ciryalondë of Pharazâin ([GetTitleByKey('d_hazaj_tollin').GetNameNoTierNoTooltip]).\n\nDuring the Second Númenórean Civil War the [GetScriptedCharacterByHistoryID('lineofciryandur1').GetDynasty.GetNameNoTooltip] supported [GetScriptedCharacterByHistoryID( 'lineofelros108' ).GetTitledFirstNameRegnal] and were rewarded with a large part of [GetTitleByKey('k_orrostar').GetNameNoTier], known as [GetTitleByKey('d_ciryanore').GetNameNoTierNoTooltip]. It is now the year 3000 of the [thirdage|E], and [GetScriptedCharacterByHistoryID( 'lineofelros114' ).GetTitledFirstName] wishes to expand Númenor back into [middleearth|E], and he has permission for the [GetScriptedCharacterByHistoryID('lineofciryandur1').GetDynasty.GetNameNoTooltip] to reclaim Hazaj Tollin. Will the [GetScriptedCharacterByHistoryID('lineofciryandur1').GetDynasty.GetNameNoTooltip] loyally rebuild their old colony or will the revolt of [GetScriptedCharacterByHistoryID('lineofciryandur9').GetFirstNameNoTooltip] be repeated?"
 numenor.0250.a: "We shall recover [GetTitleByKey('d_hazaj_tollin').GetNameNoTierNoTooltip]."
 numenor.0250.a.tt: "Grants a claim on [GetTitleByKey('d_hazaj_tollin').GetNameNoTier]"
 
 numenor.0260.t: "The Lord of the Nunduinë"
 numenor.0260.desc: "The House of [GetScriptedCharacterByHistoryID('lineofciryamir1').GetDynasty.GetName] have ruled the [GetTitleByKey('d_nunduine').GetNameNoTier] since the days of [GetScriptedCharacterByHistoryID('lineofelros10').GetTitledFirstNameRegnal], and are descendants of [elrosshort|E] through a female line. The early history of the house of [GetScriptedCharacterByHistoryID('lineofciryamir1').GetFirstName] is dominated by [GetScriptedCharacterByHistoryID('nazgul5').GetFirstName], who usurped the throne of [GetTitleByKey('k_an_balkumagan').GetNameNoTier] from his father and murdered him, Khôrahil then revolted against [numenor|E] and the Line of Elros, being aided by the Dark Lord [sauroncharacter|E], while Khôrahil rebelled his wife and sister managed to flee back to Númenor with her children, who returned to the Nunduinë.\n\n Following the [akallabeth|E] the house of Ciryamir suffered in the struggle to restore Númenor but ever since they have ruled faithfuly, with many of the house occupying positions in the King's Council. During the reign of [GetScriptedCharacterByHistoryID( 'lineofelros112' ).GetTitledFirstName] the house of Ciryamirionath were insulted, because a small part of their domain was given over to the restored [GetTitleByKey('d_nisimaldar').GetNameNoTier], while Ar-Airendur compensented the Ciryamirionath with expanding their domain to the north, some still believe this insult should not go unpunished, although [GetScriptedCharacterByHistoryID( 'lineofelros114' ).GetTitledFirstName] has offered us aid in restoring the ancient colony of An-Balkûmagân for Númenor. Should we remain loyal to the Line of Elros or shall we follow in the footsteps of Khôrahil and declare our loyalty to the Dark Lord?"
 numenor.0260.a: "We shall recover An-Balkûmagân for the Line of Elros."
 numenor.0260.a.tt: "The House of Ciryamirionath remains loyal"
 numenor.0260.b: "We pledge our loyalty to the Dark Lord."
 numenor.0260.b.tt: "The House of Ciryamirionath follows in the footsteps of Khôrahil"

 ################################
 #### Numenorean Reclamation ####
 ################################
 
 numenor.1000.t: "Reclamation of Umbar"
 numenor.1000.desc: "[umbar|E] has finally been brought back under our control, we have sent our engineers to repair the old harbour, having fallen in ruin due to many raids and lack of funds by the local folk, the city itself is a ruin, you would not be able to tell it was once a mighty haven of [numenor|E], if not for the rare building that still stands. The local Lord, claims to be a descendant of [elrosshort|E], through [GetScriptedCharacterByHistoryID('lineofanarion53').GetFirstName] of [gondor|E], and if so, will be a useful ally in controlling this wild people; the [haradrim|E] have no love for us, but we do not need them to love us, only to obey us. The Haven of Ancalimon has been reclaimed from the barbarians!"
 numenor.1000.a: "Let us restore this Great Haven."
 numenor.1000.a.tt: "[GetTitleByKey('e_umbar').GetNameNoTier] has been brought back under the control of [GetTitleByKey('e_numenor').GetNameNoTier]"
 
 numenor.1001.t: "Reconquest of Umbar"
 numenor.1001.desc: "It seems that the [numenoreans|E] want to restore their old Empire. We shall have to increase the defense our borders."
 numenor.1001.a: "Umbar is no more."
 numenor.1001.a.tt: "[GetTitleByKey('e_umbar').GetNameNoTier] has been brought under the control of [GetTitleByKey('e_numenor').GetNameNoTier]"
 
 numenor.1002.t: "The Land of the Sun Reclaimed"
 numenor.1002.desc: "Long had [GetTitleByKey('e_pharazain').GetNameNoTier] been corrupted and feeble, controlled by the [haradrim|E] House of [GetScriptedCharacterByHistoryID('lineoftumakveh0').GetDynasty.GetName], which pretends to be [adunaic|E], how low it had fallen, the Bâitha'n-Kadîr had long stood as a puppet, ignored and forgotten by the [bellakari|E], and the mighty ports of Pharazâin stood strong, but collapsing after millennia of mistreatment, [GetTitleByKey('d_korlea').GetNameNoTier], once the mightiest of the ports in the [bayoftulwang|E], is now half-sunken and a shadow of its former self, but no matter, we shall rebuild this mighty land, and bring it back to the greatness it deserves. Our jewel in the Bay of Tûlwang shall be bright once more!"
 numenor.1002.a: "The Land of The Sun has been reclaimed for Númenor"
 numenor.1002.a.tt: "[GetTitleByKey('e_pharazain').GetNameNoTier] is now a under the control of [GetTitleByKey('e_numenor').GetNameNoTier]"
 
 numenor.1003.t: "Bellakar No More"
 numenor.1003.desc: "After an invasion by the [numenoreans|E], The lands of [bellakar|E] have been declared a [numenorean|E] colony once more with the Bâitha’n-Kadîr replacing the [GetScriptedCharacterByHistoryID('lineoftumakveh0').GetDynasty.GetName]."
 numenor.1003.a: "Bellakar is no more."
 numenor.1003.a.tt: "[GetTitleByKey('e_bellakar').GetNameNoTier] has been conquered by the Númenóreans"
 
 numenor.1004.t: "Thâni-Hazâd United"
 numenor.1004.desc: "[GetTitleByKey('e_thani_hazad').GetNameNoTier] had long been a prized possession of the House of [elrosshort|E], being given to their second sons ever since the sack of [umbar|E] by the [haradrim|E] and [orcs|E] until the Line of [elrosshort|E] there fell to infighting and their remnants were assimilated into the Haradrim. After a long military campaign, we have now successfully brought the Seven Lands back into the fold and we shall restore the ports to the [numenorean|E] standard."
 numenor.1004.a: "Time to rebuild the Jewels of the South."
 numenor.1004.a.tt: "[GetTitleByKey('e_thani_hazad').GetNameNoTier] is now a part of [GetTitleByKey('e_numenor').GetNameNoTier] once more"
 
 numenor.1005.t: "The Council of The Seven Is No More"
 numenor.1005.desc: "It seemed impossible that anyone would unite the Seven Lands, but we have received news from [GetTitleByKey('c_armenelos').GetNameNoTier] that [GetTitleByKey('e_thani_hazad').GetNameNoTier] has been fully occupied by the [numenoreans|E]."
 numenor.1005.a: "An impressive feat, if nothing else."
 numenor.1005.a.tt: "[GetTitleByKey('e_thani_hazad').GetNameNoTier] is now a part of [GetTitleByKey('e_numenor').GetNameNoTier]"
 
 numenor.1006.t: "Gondor Brought Back Into The Fold"
 numenor.1006.desc: "[gondor|E], the land of Stone, has been succesfully reintegrated into [numenor|E], quite peacefully, as the Gondorians have showed that they are not barbarians, and that the blood of Númenor still runs strong there. the Ar- has been invited by the local nobility for a tour of the new colony, where at [GetTitleByKey('c_minas_tirith').GetNameNoTier] the Ar- was presented with a sapling of the White Tree, a descendant of [GetScriptedCharacterByHistoryID('lineofelmo8').GetFirstName] the Fair, and will be planted at the Palace of the Kings in [GetTitleByKey('c_armenelos').GetNameNoTier], the restoration of the White Tree marks the end of the [GetFaithByKey('melkorite').GetAdherentName] suffering, their corrupt decisions have been undone, and [GetScriptedCharacterByHistoryID('lineisildur0').GetFirstName] the Brave's actions are now known in Númenor."
 numenor.1006.a: "Nimloth the Fair, reborn..."
 numenor.1006.a.tt: "[GetTitleByKey('e_gondor').GetNameNoTier] has been integrated into [GetTitleByKey('e_numenor').GetNameNoTier]"
 
 numenor.1007.t: "The Ruin of Gondor"
 numenor.1007.desc: "[gondor|E], the land of Stone, has been attacked from land and sea by the [numenorean|E] Empire and now is a mere colony of Númenor."
 numenor.1007.a: "Gondor has fallen..."
 numenor.1007.a.tt: "[GetTitleByKey('e_gondor').GetNameNoTier] is now a part of [GetTitleByKey('e_numenor').GetNameNoTier]"
 
 numenor.1008.t: "The Harnen"
 numenor.1008.desc: "Named and discovered by [GetScriptedCharacterByHistoryID( 'lineofelros6' ).GetTitledFirstNameRegnal], the Harnen was once an important economic artery, being home to great colonies such as Zimralôni, Abârloni and Kadar an-Bêlabâr, these mighty cities dominated the Zâyan an-Khârurush and ensured our trade through the wildlands of [harad|E] was secure. From Tirith Amrûn our Haradric vassals were watched so that they would harbour no delusion of rebellion, however, the machinations of the Dark Lord weakened our colony when [adunabeth|E] rebelled, and while his rebellion was crushed, the colony suffered but remained as part of our Empire until the [akallabeth|E], in which we lost it. Now we have restored our rule there and merchants from our Empire have already begun migrating there to trade, the Harnen is once more [numenorean|E]."
 numenor.1008.a: "The riches of the Harnen are ours."
 numenor.1008.a.tt: "The Harnen region has been reclaimed by the Númenóreans"
 
 numenor.1009.t: "The Harnen Free No Longer"
 numenor.1009.desc: "The Harnen, one of the most important trade routes in [middleearth|E], has been conquered by the [numenoreans|E] as part of their so-called 'Anti-Piracy' Expedition."
 numenor.1009.a: "The Spoils of the Harnen are now those of Númenor."
 numenor.1009.a.tt: "The Harnen region is now a part of the Númenórean Empire"

