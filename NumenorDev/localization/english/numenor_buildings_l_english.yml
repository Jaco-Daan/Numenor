l_english:

#### Numenor Submod Buildings ####

 #Evaluated

 building_type_wonder_meneltarma_01: "The Meneltarma"
 building_type_wonder_meneltarma_01_desc: "The [meneltarma|E] is the highest point in all of [numenor|E]. It is believed that [aman|E] can be seen from its heights."
 building_wonder_meneltarma_01: "The Pillar of Heaven"
 building_wonder_meneltarma_01_desc: "The [meneltarma|E] is the highest point in all of [numenor|E]. It is believed that [aman|E] can be seen from its heights. The early Kings of Númenor had roads built up the slopes so the three festivals of [Concept('eruiluvatar','Êru')|E] could be attended by the people. Later Kings would neglect it, however, and during the reign of [pharazon|E] access was forbidden on pain of death."
 building_wonder_meneltarma_02: "The Unbroken Pillar of Heaven"
 building_wonder_meneltarma_02_desc: "The [meneltarma|E] is the highest point in all of [numenor|E]. It is believed that [aman|E] can be seen from its heights.\n\nDuring the [akallabeth|E], Tar-Míriel ran up the hill, seeking to beg [Concept('eruiluvatar','Êru')|E] to spare Númenor its fate. The slick rain nearly caused her to fall to her death, but through providence she made it to the top and prayed to Êru, who had mercy on her and her people, leaving the mountaintop as one of the few places untouched by the destruction."
 building_wonder_meneltarma_03: "The Pillar of the Fallen"
 building_wonder_meneltarma_03_desc: "The Three Prayers were restored immediately upon the [meneltarma|E] by Tar-Míriel. In time, however, it would evolve beyond a place of worship to [Concept('eruiluvatar','Êru')|E], becoming a site of rememberance to the victims of the Shadow, so that they would remember to never fall under it again. The total prohibition on speech other than the Three Prayers was also lifted."

 building_type_wonder_armenelos_01: "Armenelos: City of Kings"
 building_type_wonder_armenelos_01_desc: "[armenelos|E], also known as Arminalêth, is the Capital of [numenor|E], fairest city of Westernesse, rivalling even Tirion. Armenelos' fortunes declined during the reign of Ar-Pharazôn who turned the city into a foggy nightmare of evil, Nimloth the Fair itself was burnt by the tyrant and the innocent people were sacrificed at the Altar of [mulkhercharacter|E], the last straw was the [akallabeth|E], which left the city in ruins for centuries, during which the capital of Númenor was Ondosto."
 building_wonder_armenelos_01: "Armenelos"
 building_wonder_armenelos_01_desc: "Armenelos, the capital of [numenor|E] and fairest city of Westernesse is a place of great prosperity. Fueled by the explorations and empire-building of its people, the city has grown fat on its vast riches."
 building_wonder_armenelos_02: "The Ruins of Armenelos"
 building_wonder_armenelos_02_desc: "[armenelos|E] is at the lowest it has ever been, a crumbling ghost town which nobody dares to enter. We must rebuild this once-fair city in order to fortify our control of [numenor|E], for it is the rightful capital of the fairest of isles."
 building_wonder_armenelos_03: "Armenelos Rebuilt"
 building_wonder_armenelos_03_desc: "[armenelos|E] has been rebuilt, restored to its standing before the Mulkhêrhili corruption, it still does not measure up to its past golden ages, funded by the empire the fair isle maintained upon the Great Lands."
 building_wonder_armenelos_04: "Armenelos the Golden"
 building_wonder_armenelos_04_desc: "[armenelos|E] has been reforged into its former splendour, traders from all of [numenor|E] and the Great Lands stay at the markets, which are filled with a diverse range of aromas and goods, spices from the Harnen, jewels from [thanihazad|E], fish from Nindamos, the list goes ever on. No longer shall we need to look at our mighty city with sorrow, we can now stand proud and look at Armenelos the Golden reborn."
 building_wonder_armenelos_05: "Nimloth the Reborn"
 building_wonder_armenelos_05_desc: "Though the tyrannical Mulkhêrhili cut down and burnt Nimloth the Fair during the reign of Ar-Pharazôn, we have learnt that Isildur of Andúnië saved a sapling which he planted in [gondor|E]. Their tree has also been dead for years, but we have found a new sapling in the slopes of Mindolluin, which has been brought back to Armenelos and planted in the King's Court. Now that Nimloth is reborn, the line of Kings shall last until the end of the world."

 numenor_realm_size_limit_01: "Your realm size must be over 100"
 numenor_realm_size_limit_02: "Your realm size must be over 300, and the holder of [GetTitleByKey('c_minas_tirith').GetName] is you or your ally"

 building_type_wonder_romenna_01: "Rómenna: Haven of the East"
 building_type_wonder_romenna_01_desc: "Rómenna was the greatest port in [numenor|E], being home to its greatest shipyards and the most skilled and brightest shipwrights in all of Middle-earth. During the reign of Ar-Gimilzôr the [faithful|E] were forced to move there which increased its population and overcrowded it, the city saw much exodus into Middle-earth during those times by the Faithful. After [akallabeth|E], in which the city was left a ruin by the waves of Númenor and was left populated only by a handful of fishermen."
 building_wonder_romenna_01: "Rómenna the Faithful"
 building_wonder_romenna_01_desc: "Rómenna was the greatest port in [numenor|E], facilitating the flow of weath onto the island and into the capital from the vast empire of Númenor. Its shipyards were the greatest in all of [aman|E], with the most skilled shipwrights of all [mankind|E]."
 building_wonder_romenna_02: "Rómenna the Ruin"
 building_wonder_romenna_02_desc: "Rómenna was left ruined by the [akallabeth|E], its great harbour was completely broken, the Aldarion Walls were crushed by the mighty waves and the city itself nearly sank into the ocean. Following the Akallabêth, Rómenna was populated only by a handful of fishermen. Although the reconstruction of Rómenna did not start until the reign of Tar-Aldarion II, who took great pride in the city his namesake loved, the reconstruction was slow and the lack of trade made it a low priority for future Kings."
 building_wonder_romenna_03: "Rómenna the Great Haven of the East"
 building_wonder_romenna_03_desc: "During the reign of Ar-Inziladûn, Rómenna regained importance as [numenor|E] began to prepare to break its self-imposed isolation. The city regained life and its former splendour began to return. During the reconstruction a Palantír was found in the ancient halls of Amandil, leader of the [faithful|E], which was transported to Armenelos. Rómenna has been restored much of its old splendour, but it still pales to its once-glory."
 building_wonder_romenna_04: "Rómenna the Gateway to Middle-earth"
 building_wonder_romenna_04_desc: "Rómenna has been restored its old glory and splendour, ships from all of Middle-earth now dock here, the great walls of Aldarion have been made anew and its shipbuilding industry has been restored, taking advantage of trade from Vinyalondë, Pelargir and Korlea. Rómenna is now one of the most important cities in Arda, being rivalled only by Pelargir and Dol Amroth."

 building_type_wonder_calmindon_01: "Calmindon"
 building_type_wonder_calmindon_01_desc: "Calmindon was a tower raised on Tol Uinen by Tar-Aldarion so it could shine a light across the Bay of Rómenna."
 building_wonder_calmindon_01: "Calmindon"
 building_wonder_calmindon_01_desc: "Calmindon was a tower raised on Tol Uinen by Tar-Aldarion when he was the prince for the Guild of Venturers, so it could shine a light across the Bay of Rómenna. It became a symbol to the sailors of [numenor|E] that they had finally returned home."
 building_wonder_calmindon_02: "Calmindon the Ruin"
 building_wonder_calmindon_02_desc: "Calmindon, like much of the rest of [numenor|E], was destroyed during the [akallabeth|E], being completely washed into the sea except its barest foundations, which quickly became overgrown."
 building_wonder_calmindon_03: "Calmindon Renewed"
 building_wonder_calmindon_03_desc: "Rebuilt by Tar-Aldarion II, Calmindon has been fully restored to its once impressive status, shining its light all across the Bay of Rómenna, welcoming the sailors of [numenor|E] home."

 building_type_wonder_erendis_01: "White House of Erendis"
 building_type_wonder_erendis_01_desc: "The White House of Erendis was built for Erendis by Tar-Meneldur as a gift for her betrothal to his son, Aldarion."
 building_wonder_erendis_01: "White House of Erendis"
 building_wonder_erendis_01_desc: "The White House of Erendis was built for Erendis by Tar-Meneldur as a gift for her betrothal to his son, Aldarion. It was located in the region of Emerië, known for its rolling hills and green plains. Tar-Ancalimë spent most of her childhood there among only women and sheep, gaining her unique ruling style from her unique upbringing, before she moved to Armenelos."
 building_wonder_erendis_02: "Ghost of Erendis"
 building_wonder_erendis_02_desc: "The White House of Erendis, spared by the [akallabeth|E] lies abandoned in the rolling hills of Emerië, having been forgotten by those who dwell near."
 building_wonder_erendis_03: "White House of Erendis Restored"
 building_wonder_erendis_03_desc: "The White House of Erendis was restored in [ageTA|E] 126 by Tar-Aldarion II. It has since served as a secondary residence for the royal family, held in trust by those who rule the land, the Bar Beregar."

 #Not Yet Evaluated

 building_type_wonder_andunie_01: "Andúnië"
 building_type_wonder_andunie_01_desc: "Andúnië is the chief city of Andustar, the former city of the House of Elatan, having been founded by Elatan's father, Númendil."
 building_wonder_andunie_01: "Andúnië: Chief Haven of the Faithful"
 building_wonder_andunie_01_desc: "Andúnië is the chief city of Andustar, one of the regions of Númenor and the former residence of the house of Elatan. Andúnië was founded by Elatan's father, Númendil to be a harbour for the Eldar that visited Númenor. During the reign of Tar-Ancalimon I, Andúnië became the chief settlement of the Elendili as persecution agains them increased. During the reiign of Ar-Gimilzôr, Andúnië's population was relocated to Rómenna which left the city as a ghost town. Andúnië was left a ruin by the Akallabêth."
 building_wonder_andunie_02: "Andúnië the Ruin"
 building_wonder_andunie_02_desc: "Andúnië was largely left intact by the [akallabeth|E], but the ages havent been kind to the old city. Andúnië has fallen into ruin do to millenia of disrepair and abandonment."
 building_wonder_andunie_03: "Andúnië: Capital of Andustar"
 building_wonder_andunie_03_desc: "While Andúnië has been rebuilt and is now a functioning city, it still has not fully recovered from the Akallabêth. Reconstruction of the city was not a priority for the Kings of Númenor due to its position, coupled with Erest being made the Chief city of Andustar led to Andúnië experiencing a decline until the Second Númenorean Civil War, in which its strategic military position in the hills of Andustar was seen as useful by Ar-Ancalimon II, and therefore expanded it after the war ended."
 building_wonder_andunie_04: "Andúnië Reborn"
 building_wonder_andunie_04_desc: "Now that Andúnië has been rebuilt to its former splendour the city has experienced a boom in population and inland trade, the quarries of Forostar and the farms of the Nunduinë have granted the city a new life, and while it is no longer visited by the Eldar, their wisdom still remains in this mighty city of the west."

 building_type_wonder_oromet_01: "Tower of Oromet"
 building_type_wonder_oromet_01_desc: "The Tower of Oromet was built in the Hill of Oromet, in Andustar, by Tar-Minastir in order to watch the lands of Valinor, during the reign of Tar-Calmacil the tower was turned into a watchtower to ensure that no Elves could come into Númenor. During the [akallabeth|E] the tower was destroyed."
 building_wonder_oromet_01: "The Tower of Oromet"
 building_wonder_oromet_01_desc: "The Tower of Oromet was built on the Hill of Oromet, in Andustar, by Tar-Minastir in order to watch the lands of Valinor, during the reign of Tar-Calmacil the tower was turned into a watchtower to ensure that no Elves could come into Númenor. During the Akallabêth the tower was destroyed."
 building_wonder_oromet_02: "Ruined Tower of Oromet"
 building_wonder_oromet_02_desc: "The Tower of Oromet was destroyed during the [akallabeth|E] by the tremors and waves that hit Númenor, it still lays in ruins to this day."
 building_wonder_oromet_03: "Restored Tower of Oromet"
 building_wonder_oromet_03_desc: "While we have no need to look upon Valinor or ensuring that the Elves do not land in Númenor, the Tower of Oromet still is a reminder of what Númenor was in its past, and restoring it is one more step into restoring our former glory."

 building_type_wonder_eldalonde_01: "Eldalondë"
 building_type_wonder_eldalonde_01_desc: "Eldalondë: Haven of the Eldar"
 building_wonder_eldalonde_01: "Eldalondë the Beautiful"
 building_wonder_eldalonde_01_desc: "Eldalondë was founded by Vëantur, Captain of the King's Ships during the reign of Tar-Elendil and grandfather to Tar-Aldarion. Eldalondë was built around the Nísimaldar, the only region in the realms of men where Mallorn trees grew, these mallorn trees were gifted by the Eldar, whom the city was named after. During the reign of Ar-Pharazôn the Mallorn Trees were cut down to be used for the Great Armament. During the Akallabêth the city was destroyed by the waves and tremors."
 building_wonder_eldalonde_02: "Eldalondë the Ruin"
 building_wonder_eldalonde_02_desc: "Eldalondë, in the wake of the [akallabeth|E], was reduced to a barren ruin, utterly ravaged by the waves of Númenor. What was left of the mallorn forest there was destoryed and the city sat abandoned for many years."
 building_wonder_eldalonde_03: "Eldalondë: Capital of Nísimaldar"
 building_wonder_eldalonde_03_desc: "Although Eldalondë has seen better days, ever since the line of Vëantur has been restored in Nísimaldar the city has seen a boom in population and riches, taking advantage of the fertile Nunduinë valley which has made it the breadbasket of Númenor the city has been rebuilt with care. The Eldar may no longer visit this fair city but their wisdom and knowledge survives, when people enter Nísimaldar they believe they have entered one of the Elven realms."
 building_wonder_eldalonde_04: "Mallorn-groves of Eldalondë"
 building_wonder_eldalonde_04_desc: "Now that we have regained contact with Middle-earth we have sent an expedition to Lórien, where saplings of the Mallorn Trees have been obtained after a deal and have now been sent to Eldalondë, where they will be planted. Once more Nísimaldar shall be the fairest county in the Westerlands."

 building_type_wonder_sorontil_01: "The Tower of Tar-Meneldur"
 building_type_wonder_sorontil_01_desc: "Sorontil is the second highest mountain range in Númenor, behind only the Meneltarma. During the reign of Tar-Meneldur a tower was built here as the sky was clearer so he could study the stars. Some of the Great Eagles also called Sorontil their home, but left during the reign of Tar-Ancalimon I."
 building_wonder_sorontil_01: "The Tower of Tar-Meneldur"
 building_wonder_sorontil_01_desc: "Sorontil is the second highest mountain range in Númenor, behind only the Meneltarma. During the reign of Tar-Meneldur a tower was built here as the sky was clearer so he could study the stars. Some of the Great Eagles also called Sorontil their home, but left during the reign of Tar-Ancalimon I."
 building_wonder_sorontil_02: "The Tower in Ruins"
 building_wonder_sorontil_02_desc: "Ever since the [akallabeth|E], in which the Tower of Meneldur was broken by the tremors, it has remained a ruin, rarely visited by anyone except pilgrims and scholars, but with enough resources and manpower we can rebuild this great tower once more."
 building_wonder_sorontil_03: "The Tower of Tar-Meneldur Renewed"
 building_wonder_sorontil_03_desc: "The Tower of Tar-Meneldur has been restored to its former glory, using stones brought from Ondosto. Our scholars now have a new place to study the stars."

 building_type_wonder_ondosto_01: "Great Quarries of Ondosto"
 building_type_wonder_ondosto_01_desc: "Ondosto was originally founded as a village for Quarry workers, although the popularity of Ruxöalë gave the village fame, coupled with the necessity for quarrying to expand Númenor's great cities meant that the city thrived. Ondosto was the city which better survived the Akallabêth, and for a time was made the Capital of Númenor as Armenelos was rebuilding, however, the tremors of the Akallabêth destroyed its quarrying industry and has yet to recover."
 building_wonder_ondosto_01: "Great Quarries of Ondosto"
 building_wonder_ondosto_01_desc: "Ondosto was originally founded as a village for Quarry workers, although the popularity of Ruxöalë gave the village fame, coupled with the necessity for quarrying to expand Númenor's great cities meant that the city thrived. However, the tremors of the Akallabêth destroyed its quarrying industry along with much of the town, leaving nothing but ruin in its wake."
 building_wonder_ondosto_02: "Dead Quarrying Industry"
 building_wonder_ondosto_02_desc: "Ondosto was a city which better survived the Akallabêth, and for a time was made the Capital of Númenor as Armenelos was rebuilding, however, the tremors of the Akallabêth destroyed its quarrying industry and has yet to recover, but as Númenor's population has risen over the last decades its fair cities must be expanded and therefore Ar-Balkazîr has shown interest in restoring the quarrying industry of Ondosto."
 building_wonder_ondosto_03: "Thriving Quarrying Industry"
 building_wonder_ondosto_03_desc: "With the help of the Council of the Sceptre the quarries of Ondosto have been rebuilt and workers have poured into the city from all Númenor, helping restore the city to its former splendour and glory. New days are ahead of us now."

 building_type_wonder_nindamos_01: "City of Nindamos"
 building_type_wonder_nindamos_01_desc: "Nindamos is a city located at the mouth of the Siril river, it was founded by Cemendur, great-grandson of Vardamir Nólimon, during his time as the representative of Mittalmar in the Council of the Sceptre, although Nindamos had been small fishing village before this. Nindamos was the most important city in the South of Númenor as it provided fish for Númenor, which would be salted and given to its sailors when they went on long voyages."
 building_wonder_nindamos_01: "City of Nindamos"
 building_wonder_nindamos_01_desc: "Nindamos is a city located at the mouth of the Siril river, it was founded by Cemendur, great-grandson of Vardamir Nólimon, during his time as the representative of Mittalmar in the Council of the Sceptre, although Nindamos had been small fishing village before this. Nindamos was the most important city in the South of Númenor as it provided fish for Númenor, which would be salted and given to its sailors when they went on long voyages."
 building_wonder_nindamos_02: "Town of Nindamos"
 building_wonder_nindamos_02_desc: "While Nindamos was not hit as hard by the Downfall as other areas were, it was still humbled during the Akallabêth, and while it quickly recovered as it was an important fishing point for Númenors fishing industry, it still never regained all of its old splendour."
 building_wonder_nindamos_03: "City of Nindamos"
 building_wonder_nindamos_03_desc: "Nindamos has now regained its old splendour and glory. Every day dozens of ships leave its port and its markets are filled with the most exquisite collection of seafood in all of Middle-earth. Peasants, merchants and nobles all visit Nindamos to purchase from its great market."
